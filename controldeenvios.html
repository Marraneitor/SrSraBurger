    <style>
    /* Base font scaling for readability */
    html { font-size: 16px; }
    html.kitchen-mode { font-size: 22px; } /* Mayor legibilidad por defecto */

    /* Fallback for Tailwind's .hidden when offline/CDN fails */
    .hidden { display: none !important; }

        :root {
            --primary-gold: #16A34A; /* remap UI accent to SR green */
            --primary-gold-dark: #15803D;
            --primary-red: #0B1220;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --bg-light: #FFFFFF;
            --bg-section: #F8F9FA;
            --border-light: #E2E8F0;
            --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
            --shadow-hover: 0 18px 45px rgba(15, 23, 42, 0.14);
            --border-radius: 24px;
            --transition: all 220ms cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1E293B 0%, #020617 55%, #000000 100%);
            color: #E5E7EB;
            line-height: 1.6;
        }

        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }

        .card-modern {
            background: rgba(15, 23, 42, 0.96);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(148, 163, 184, 0.3);
            transition: var(--transition);
        }

        .card-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 22px 55px rgba(15, 23, 42, 0.85);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-gold) 0%, var(--primary-gold-dark) 100%);
            color: #0B1120;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            box-shadow: var(--shadow-soft);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            box-shadow: var(--shadow-soft);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }

        .btn-info {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: var(--transition);
            box-shadow: var(--shadow-soft);
        }

        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        /* Controles superiores (modo cocina, pantalla completa, etc.) más compactos */
        .top-control-btn {
            padding: 6px 12px;
            font-size: 11px;
            border-radius: 9999px;
        }
        html.kitchen-mode .top-control-btn {
            font-size: 0.8rem;
            padding: 6px 10px;
        }

        /* Barra de controles fija a un costado para no estorbar arriba */
        .kitchen-toolbar {
            position: fixed;
            top: 3.5rem; /* debajo del sr-shell topbar */
            right: 1rem;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0.4rem;
            z-index: 40;
        }

        @media (max-width: 768px) {
            .kitchen-toolbar {
                top: auto;
                bottom: 1rem;
                right: 0.75rem;
                flex-direction: column;
            }
        }

        /* Barra de filtros (ahora inline, no fija) */
        .kitchen-filter-bar {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* Barra lateral de tarjetas de estado (Pendientes, Preparando, etc.) */
        .kitchen-stats-bar {
            position: fixed;
            top: 5.5rem;
            left: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 34;
        }

        .kitchen-stat-card {
            width: 9rem;
            padding: 0.75rem 0.6rem;
            border-radius: 14px;
        }

        .kitchen-stat-card h3 {
            font-size: 1.1rem;
        }

        .kitchen-stat-card p {
            font-size: 0.78rem;
        }

        @media (max-width: 1024px) {
            .kitchen-stats-bar {
                position: static;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 1rem;
                margin-bottom: 1.5rem;
            }

            .kitchen-stat-card {
                width: auto;
            }
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .status-pending {
            background: rgba(252, 211, 77, 0.15);
            color: #FBBF24;
        }

        .status-preparing {
            background: rgba(59, 130, 246, 0.12);
            color: #60A5FA;
        }

        .status-ready {
            background: rgba(16, 185, 129, 0.12);
            color: #6EE7B7;
        }

        .status-delivering {
            background: rgba(129, 140, 248, 0.15);
            color: #A5B4FC;
        }

        .status-delivered {
            background: rgba(148, 163, 184, 0.18);
            color: #CBD5F5;
        }

        .order-card {
            border-left: 4px solid var(--primary-gold);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .order-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top left, rgba(250, 204, 21, 0.08), transparent 55%);
            pointer-events: none;
        }

        /* Semáforo de prioridad temporal (borde superior) */
        .priority-fresh {
            box-shadow: 0 -3px 0 #22C55E inset;
        }
        .priority-warning {
            box-shadow: 0 -3px 0 #EAB308 inset;
        }
        .priority-urgent {
            box-shadow: 0 -3px 0 #EF4444 inset;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .notification.error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .floating-stats {
            position: fixed;
            bottom: 20px;
            left: 20px;

            }
        }

        .pulse-ring {
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #4B5563;
            border-radius: 12px;
            padding: 14px 16px;

            opacity: 0.9;

        }

        .order-item .checkmark {
            display: none;
            color: #10b981;
            margin-left: 8px;

        }

        .breakdown-item {

            font-weight: 600;

        .order-products .breakdown .breakdown-item.checked {
            background-color: #16A34A;
            border-color: #22C55E;
            text-decoration: line-through;
            opacity: 0.9;
        }

        .order-products .breakdown .breakdown-item.checked::after {
            content: ' ✓';

            font-weight: bold;
        }

    html.kitchen-mode .card-modern { padding: 28px; }
    html.kitchen-mode .status-badge { font-size: 0.9rem; padding: 8px 14px; }
    html.kitchen-mode .btn-primary,

    html.kitchen-mode h4 { font-size: 1.25rem; }
    html.kitchen-mode .text-sm { font-size: 0.95rem; }
    html.kitchen-mode .text-xs { font-size: 0.9rem; }
    html.kitchen-mode .order-card { border-left-width: 6px; }

        .customer-info {
            background: radial-gradient(circle at left, rgba(253, 224, 71, 0.18), transparent 55%);
            border-radius: 14px;
            padding: 14px 16px;
            border: 1px solid rgba(250, 204, 21, 0.4);

        }

        .customer-info .label {
            font-size: 0.75rem;

        }

        }

            border-radius: 9999px;
            padding: 4px 10px;

            color: #FACC15;
            border: 1px solid rgba(250, 204, 21, 0.7);
        }

            background: rgba(30, 64, 175, 0.9);
        }

    /* Productos más grandes y legibles */
    .order-products .item-title { font-size: 1.8rem; font-weight: 900; color: #F9FAFB; }
    .order-products .item-price { font-size: 1.25rem; font-weight: 800; color: #111827; }
    .order-products .breakdown { font-size: 1.12rem; }
        .order-products .breakdown .text-sm,
    .order-products .breakdown .text-xs { font-size: 1.12rem; }

        .order-products .breakdown .text-sm span { padding: 4px 10px; border-radius: 9999px; display: inline-block; }

    html.kitchen-mode .order-products .item-title { font-size: 2.4rem; }
    html.kitchen-mode .order-products .item-price { font-size: 1.9rem; }
    html.kitchen-mode .order-products .breakdown { font-size: 1.35rem; }
        html.kitchen-mode .order-products .breakdown .text-sm,
    html.kitchen-mode .order-products .breakdown .text-xs { font-size: 1.35rem; }
    html.kitchen-mode .order-total .amount { font-size: 2.2rem; }

        @media (max-width: 768px) {
            .card-modern {
                padding: 16px;
                margin-bottom: 16px;
            }

            .floating-stats {
                position: relative;
                bottom: auto;
                left: auto;
                margin: 20px 0;
                width: 100%;
            }

            .btn-primary, .btn-success, .btn-info {
                width: 100%;
                margin-bottom: 8px;
            }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Estilos adicionales para botones de confirmación */
        .btn-confirmed {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            opacity: 0.8;
            cursor: default;
        }

        .btn-confirmed:hover {
            transform: none;
            box-shadow: var(--shadow-soft);
        }

        /* Modal overlay */
        .modal-overlay {
            backdrop-filter: blur(4px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Efectos de hover mejorados para botones de acción */
        .action-button {

            overflow: hidden;
        }

            padding-bottom: 0.7rem;
            font-weight: 700;

        }

        .kitchen-primary {

            padding-bottom: 0.9rem;
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.55);

    </style>

    <body class="min-h-screen">
    <!-- WA status (ocultos, usados por JS) -->
    <span id="wa-status-btn" class="hidden"></span>
    <span id="wa-status-label" class="hidden">WA</span>
    <span id="wa-status-dot" class="hidden"></span>

    <!-- Main Content -->
    <main class="w-full px-2 sm:px-4 pt-2 pb-8">
        <!-- Stats ocultos (usados por JS, sin mostrar) -->
        <span id="pending-count" class="hidden">0</span>
        <span id="preparing-count" class="hidden">0</span>
        <span id="delivering-count" class="hidden">0</span>
        <span id="completed-count" class="hidden">0</span>

        <!-- Filter Buttons -->
        <div class="mb-3">
            <div class="flex items-center gap-2 mb-2">
                <button id="toggle-filter-btn" onclick="toggleFilterBar()"
                    title="Mostrar / ocultar menú de filtros"
                    class="inline-flex items-center gap-2 text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-800 hover:bg-gray-700 text-gray-400 hover:text-gray-200 border border-gray-700 transition-all duration-200">
                    <i id="toggle-filter-icon" class="fas fa-chevron-down text-[10px] transition-transform duration-200"></i>
                    <span id="toggle-filter-label">Mostrar filtros</span>
                </button>
            </div>
            <div id="filter-bar-wrapper" class="hidden overflow-hidden transition-all duration-300">
                <div class="flex flex-wrap gap-3 kitchen-filter-bar">
                    <button onclick="filterOrders('all')" class="filter-btn btn-primary active" data-filter="all">
                        <i class="fas fa-list mr-2"></i>Todos
                    </button>
                    <button onclick="filterOrders('pending')" class="filter-btn btn-info" data-filter="pending">
                        <i class="fas fa-clock mr-2"></i>Pendientes
                    </button>
                    <button onclick="filterOrders('preparing')" class="filter-btn btn-info" data-filter="preparing">
                        <i class="fas fa-utensils mr-2"></i>Preparando
                    </button>
                    <button onclick="filterOrders('delivering')" class="filter-btn btn-info" data-filter="delivering">
                        <i class="fas fa-truck mr-2"></i>En Camino
                    </button>
                    <a href="Historialdepedidos.html" class="filter-btn btn-info inline-flex items-center" data-filter="history">
                        <i class="fas fa-clock-rotate-left mr-2"></i>Historial
                    </a>
                    <a href="itemsvendidos.html" class="filter-btn btn-info inline-flex items-center" data-filter="sold-items">
                        <i class="fas fa-chart-pie mr-2"></i>Items vendidos
                    </a>
                </div>
            </div>
        </div>
        <script>
        (function() {
            var visible = localStorage.getItem('sr_filterbar_visible') === '1';
            function applyState(v) {
                var wrap  = document.getElementById('filter-bar-wrapper');
                var icon  = document.getElementById('toggle-filter-icon');
                var label = document.getElementById('toggle-filter-label');
                if (!wrap) return;
                if (v) {
                    wrap.classList.remove('hidden');
                    if (icon)  { icon.style.transform = 'rotate(180deg)'; }
                    if (label) label.textContent = 'Ocultar filtros';
                } else {
                    wrap.classList.add('hidden');
                    if (icon)  { icon.style.transform = 'rotate(0deg)'; }
                    if (label) label.textContent = 'Mostrar filtros';
                }
            }
            window.toggleFilterBar = function() {
                visible = !visible;
                localStorage.setItem('sr_filterbar_visible', visible ? '1' : '0');
                applyState(visible);
            };
            applyState(visible);
        })();
        </script>

        <!-- Orders Container -->
        <div id="orders-container">
            <!-- Las órdenes se cargarán aquí dinámicamente -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-16 hidden">
            <div class="w-24 h-24 bg-gray-800 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-inbox text-gray-500 text-3xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-300 mb-2">No hay pedidos</h3>
            <p class="text-gray-500">Los nuevos pedidos aparecerán aquí automáticamente.</p>

    </main>

    <!-- Stats móvil (ocultos, usados por JS) -->
    <span id="mobile-pending" class="hidden">0</span>
    <span id="mobile-preparing" class="hidden">0</span>
    <span id="mobile-delivering" class="hidden">0</span>

    <!-- Notification Toast -->
    <div id="notification" class="notification"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner"></div>
    </div>

    <!-- Firebase Configuration -->
    <script type="module" src="js/firebase-config.js"></script>
    
    <script>
        // Variables globales
        let orders = [];
        let currentFilter = 'all';
        let unsubscribeOrders = null;
        let baseFontPx = parseInt(localStorage.getItem('kitchenBaseFontPx') || '22', 10); // default 22px
        let comboConfigurations = {}; // Configuraciones de combos
        let localAutoRefreshId = null;

        // === Notificación de nuevo pedido (sonido + voz, repetitivo hasta confirmar) ===
        let _knownOrderIds = new Set();
        let _orderNotifierInitialized = false;
        let _newOrderAlertIntervalId = null;
        let _notifAudioCtx = null;
        let _audioUnlocked = false;

        function ensureAudioUnlocked() {
            if (_audioUnlocked) return;
            _audioUnlocked = true;
            try {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (Ctx && !_notifAudioCtx) _notifAudioCtx = new Ctx();
                if (_notifAudioCtx && _notifAudioCtx.state === 'suspended') {
                    _notifAudioCtx.resume().catch(() => {});
                }
            } catch (_) {}
        }

        // Muchos navegadores requieren una interacción del usuario para audio.
        document.addEventListener('pointerdown', ensureAudioUnlocked, { once: true });

        function shouldAlertForOrder(order) {
            if (!order) return false;
            if (isOrderCanceled(order)) return false;
            const status = String(order.status || '').toLowerCase();
            const confirmed = !!order.confirmed;
            return status === 'pending' && !confirmed;
        }

        function hasAnyUnconfirmedPending(list) {
            const arr = Array.isArray(list) ? list : [];
            return arr.some(shouldAlertForOrder);
        }

        function isRecentOrder(order, withinMs = 120000) {
            try {
                const t = Date.parse(order && order.timestamp ? String(order.timestamp) : '');
                if (!Number.isFinite(t)) return false;
                return (Date.now() - t) >= 0 && (Date.now() - t) <= withinMs;
            } catch (_) {
                return false;
            }
        }

        function speakNewOrder() {
            try {
                if (!('speechSynthesis' in window)) return;
                // Intentar desbloquear audio primero
                ensureAudioUnlocked();

                const phrase = 'Ha llegado un nuevo pedido';
                const u = new SpeechSynthesisUtterance(phrase);
                u.lang = 'es-MX';
                u.rate = 1;
                u.pitch = 1;
                u.volume = 1;

                const voices = window.speechSynthesis.getVoices ? window.speechSynthesis.getVoices() : [];
                const esVoice = (voices || []).find(v => String(v.lang || '').toLowerCase().startsWith('es'));
                if (esVoice) u.voice = esVoice;

                // Cancelar cualquier cosa en cola y hablar
                try { window.speechSynthesis.cancel(); } catch (_) {}
                window.speechSynthesis.speak(u);
            } catch (e) {
                // No bloquear la UI si falla
                console.warn('No se pudo reproducir voz:', e);
            }
        }

        function startNewOrderAlert() {
            if (_newOrderAlertIntervalId) return;

            // Si aún no hay interacción, avisar una sola vez
            if (!_audioUnlocked) {
                showNotification('Nuevo pedido. Toca la pantalla para activar sonido.', 'success');
            }

            const tick = () => {
                // Si ya no hay pendientes sin confirmar, parar
                if (!hasAnyUnconfirmedPending(orders)) {
                    stopNewOrderAlert();
                    return;
                }
                playNotificationSound();
                speakNewOrder();
            };

            // Ejecutar inmediato y luego repetir
            tick();
            _newOrderAlertIntervalId = setInterval(tick, 8000);
        }

        function stopNewOrderAlert() {
            if (_newOrderAlertIntervalId) {
                try { clearInterval(_newOrderAlertIntervalId); } catch (_) {}
                _newOrderAlertIntervalId = null;
            }
            try {
                if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            } catch (_) {}
        }

        function syncNewOrderNotifier(incomingOrders) {
            const arr = Array.isArray(incomingOrders) ? incomingOrders : [];
            const incomingIds = new Set(arr.map(o => String(o.id || '')));

            if (!_orderNotifierInitialized) {
                _orderNotifierInitialized = true;
                _knownOrderIds = incomingIds;

                // Si al abrir la página hay un pedido MUY reciente pendiente sin confirmar, alertar.
                const hasRecent = arr.some(o => shouldAlertForOrder(o) && isRecentOrder(o, 120000));
                if (hasRecent) startNewOrderAlert();
                return;
            }

            // Todos los pedidos nuevos (cualquier status) — para WA
            const allNewOrders = arr.filter(o => {
                const id = String(o.id || '');
                return id && !_knownOrderIds.has(id) && !isOrderCanceled(o);
            });

            // Solo los 'pending' sin confirmar — para alerta sonora/visual
            const newPending = allNewOrders.filter(o => shouldAlertForOrder(o));

            _knownOrderIds = incomingIds;

            if (allNewOrders.length) {
                // ── Notificación WhatsApp para TODOS los pedidos nuevos ────
                allNewOrders.forEach(order => sendWhatsAppOrderNotification(order));
            }

            if (newPending.length) {
                showNotification('¡Ha llegado un nuevo pedido!', 'success');
                startNewOrderAlert();
            } else {
                // Sin nuevos pendientes, pero tal vez ya se confirmaron todos
                if (!hasAnyUnconfirmedPending(arr)) stopNewOrderAlert();
            }
        }

        /**
         * Envía un pedido al API local de WhatsApp.
         * Falla silenciosamente si el servidor no está disponible o WA no está configurado.
         */
        async function sendWhatsAppOrderNotification(order, forceAll = false) {
            try {
                const resp = await fetch('/api/whatsapp/notify-order', {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify({ order, forceAll }),
                });
                if (resp.ok) {
                    const j = await resp.json();
                    const num = String(order.id || '').slice(-6);
                    if (j.ok) {
                        console.log(`📲 [WhatsApp] Pedido #${num} → cocina: ✅${j.delivery ? ' | repartidores: ✅' : ''}`);
                        if (j.deliveryError) console.warn('[WhatsApp] Repartidores falló:', j.deliveryError);
                    } else {
                        console.warn('[WhatsApp] Notificación fallida:', j.error);
                    }
                }
            } catch (e) {
                console.warn('[WhatsApp] No disponible:', e.message);
            }
        }

        /**
         * Envía a un grupo específico vía /api/whatsapp/notify-order con target explícito.
         */
        async function _sendToGroup(orderId, target) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;
            const attr = target === 'kitchen' ? `[data-wa-kitchen-btn="${orderId}"]` : `[data-wa-delivery-btn="${orderId}"]`;
            const btn  = document.querySelector(attr);
            const origHTML = btn ? btn.innerHTML : '';
            if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; }
            try {
                const resp = await fetch('/api/whatsapp/notify-order', {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify({ order, target }),
                });
                const j = await resp.json();
                if (!j.ok) throw new Error(j.error || 'Error');
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-check"></i> ✓';
                    setTimeout(() => { btn.disabled = false; btn.innerHTML = origHTML; }, 3000);
                }
            } catch (e) {
                console.error('Error enviando WA:', e);
                if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
            }
        }

        function sendToKitchen(orderId)  { _sendToGroup(orderId, 'kitchen');  }

        async function sendOrderToWhatsApp(orderId) {

        function splitComboChoices(text) {
            return String(text || '').split(/\s*\|\s*/).filter(Boolean);

        function parseChoiceText(choiceText) {
            const res = { name: '', qty: 1, toppings: [], fries: null, sauce: null, onionRings: false, extras: [], includeLine: false, drinks: [], portionGrams: null };
            let t = String(choiceText || '').trim();
            const qtyMatch = t.match(/^(\d+)\s*x\s*/i);
            if (qtyMatch) { res.qty = parseInt(qtyMatch[1], 10) || 1; t = t.slice(qtyMatch[0].length).trim(); }
            const nameMatch = t.match(/^[^,(]+/);
            res.name = nameMatch ? nameMatch[0].trim() : t;
            if (/^Incluye\s*:/i.test(String(choiceText || ''))) {
                res.includeLine = true;
            }

            // Boneless: detectar gramaje para etiquetar papas correctamente (250g/500g/1000g)
            try {
                const mPort = String(choiceText || '').match(/Porci[oó]n\s*:\s*(\d+)\s*g/i);
                if (mPort && mPort[1]) res.portionGrams = parseInt(mPort[1], 10) || null;
            } catch (_) {}

            const topMatch = t.match(/\(\+\s*([^\)]+)\)/);
            if (topMatch && topMatch[1]) res.toppings = topMatch[1].split(/\s*,\s*/).filter(Boolean);

            // Detectar papas "principales" (incluidas o elegidas), pero NO cuando
            // vienen como extra del menú en formato "1x Papas ...".
            let friesMatch = null;
            if (!/\d+\s*x\s+Papas/i.test(t)) {
                friesMatch = t.match(/Papas\s*(?::|\s)\s*([^,]+)/i);
            }
            if (friesMatch) res.fries = friesMatch[1].trim();
            const sauceMatch = t.match(/Salsas?\s*:\s*([^,|\)]+)/i);
            if (sauceMatch) res.sauce = sauceMatch[1].trim();
            if (/Aros\s+de\s+Cebolla/i.test(t)) res.onionRings = true;
            
            // Mejorar detección de Coca-Cola
            const cocaMatch = t.match(/Coca(?:-Cola)?\s*([\d.,]+)\s*[Ll]/i);
            if (cocaMatch) {
                res.drinks.push(`Coca-Cola ${cocaMatch[1]}L`);
            } else if (/Coca(?:-Cola)?\s*3\s*[Ll]/i.test(t)) {
                res.drinks.push('Coca-Cola 3L');
            } else if (/Coca(?:-Cola)/i.test(t)) {
                res.drinks.push('Coca-Cola');
            }
            
            const extraItems = t.match(/\b(\d+)x\s+([^,|]+)/g);
            if (extraItems) {
                extraItems.forEach(e => { const m = e.match(/(\d+)x\s+(.+)/); if (m) res.extras.push({ quantity: parseInt(m[1], 10), name: m[2].trim() }); });
            }
            return res;

        function isBonelessItem(itemOrName) {

        function cleanFriesType(raw) {

        function getPapasGramaje(name) {

            if (!/papa/i.test(n)) return null;
            if (/extragrande|xl\b/i.test(n)) return '560g';
            if (/mediana/i.test(n)) return '280g';

        function friesLabelForContext(itemOrName, friesRaw, portionGrams, opts) {
            const friesType = cleanFriesType(friesRaw);
            const grams = Number(portionGrams);
            const boneless = isBonelessItem(itemOrName);

            let label;
            // Si es combo, SIEMPRE respetar tamaño de combo (sobre todo en Combo Boneles)
            const comboKey = opts && opts.comboKey ? String(opts.comboKey) : '';
            if (comboKey) {
                const sizeLabel = comboKey.includes('combofamiliar') ? 'Papas Extragrandes' : 'Papas Medianas';
                label = friesType ? `${sizeLabel} (${friesType})` : sizeLabel;

                    ? 'Papas Extragrandes'
                    : (Number.isFinite(grams) && grams >= 500)
                        ? 'Papas Medianas'
                        : 'Papas Complemento';
                label = friesType ? `${sizeLabel} (${friesType})` : sizeLabel;
            } else if (/(complemento|mediana|medianas|grande|grandes|xl)/i.test(friesType)) {
                // Si ya trae tamaño explícito (mediana/grande/xl/complemento), respetarlo
                label = friesType.startsWith('Papas') ? friesType : `Papas ${friesType}`;
            } else if (friesType) {
                // Papas de $25 (hamburguesas/hotdogs): siempre son complemento
                label = `Papas Complemento (${friesType})`;
            } else {
                label = 'Papas Complemento';
            }
            const g = getPapasGramaje(label);
            return g ? `${label} · ${g}` : label;

        // Escapar texto para evitar inyectar HTML en nombres de productos/toppings
        function escapeHtml(text) {
            const str = String(text == null ? '' : text);
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Mostrar solo el texto que escribe el cliente (sin prefijos tipo "PREMIUM:" o "Alohawai Burger:")
        function stripSpecificationPrefixOne(text) {
            let t = String(text == null ? '' : text).trim();
            if (!t) return '';
            t = t.replace(/^ESPECIFICACIONES\s*:\s*/i, '').trim();
            const idx = t.indexOf(':');
            if (idx > -1) {
                const after = t.slice(idx + 1).trim();
                return after || t;
            }
            return t;
        }
        function formatSpecificationsForDisplay(specifications) {
            const raw = String(specifications == null ? '' : specifications).trim();
            if (!raw) return '';
            return raw
                .split('|')

        function parseSingleDetails(text) {
            const res = { toppings: [], fries: null, sauce: null, onionRings: false, extras: [], hotdog: false, portionGrams: null };
            try {
                const mPort = String(text || '').match(/Porci[oó]n\s*:\s*(\d+)\s*g/i);
                if (mPort && mPort[1]) res.portionGrams = parseInt(mPort[1], 10) || null;
            } catch (_) {}
            const parts = String(text || '').split(/\s*,\s*/).map(s => s.trim()).filter(Boolean);
            parts.forEach(p => {
                if (/^\+\s*/.test(p)) {
                    const tops = p.replace(/^\+\s*/, '').split(/\s*,\s*/).filter(Boolean);
                    res.toppings.push(...tops);
                } else if (/^Hamburguesa\s*(\d+\s*)?:/i.test(p)) {
                    // Nombre de hamburguesa en combo (ej: "Hamburguesa: PREMIUM") → tomar solo el nombre
                    const burgerName = p.replace(/^Hamburguesa\s*(\d+\s*)?:\s*/i, '').trim();
                    if (burgerName) res.toppings.push(burgerName);
                } else if (/^Papas\s*(?::|\s)/i.test(p)) {
                    // Formatos estándar tipo "Papas Gajo Medianas" o "Papas: Gajo Medianas"
                    res.fries = p.replace(/^Papas\s*(?::|\s)\s*/i, '').trim();
                } else if (/^Salsas?\s*:/i.test(p)) {
                    res.sauce = p.replace(/^Salsas?\s*:\s*/i, '').trim();
                } else if (/^Salsa\s*:/i.test(p)) {
                    res.sauce = p.replace(/^Salsa\s*:\s*/i, '').trim();
                } else if (/Aros\s+de\s+Cebolla/i.test(p)) {
                    res.onionRings = true;
                } else if (/Hot\s*dog/i.test(p) || /Perro\s+caliente/i.test(p)) {
                    res.hotdog = true;
                } else if (/^\d+x\s+/i.test(p)) {
                    const m = p.match(/(\d+)x\s+(.+)/); 
                    if (m) {
                        const extraName = m[2].trim();
                        // Detectar Coca-Cola específicamente
                        if (/Coca(?:-Cola)?/i.test(extraName)) {
                            res.extras.push({ quantity: parseInt(m[1], 10), name: 'Coca-Cola 3L' });
                        } else {
                            res.extras.push({ quantity: parseInt(m[1], 10), name: extraName });
                        }
                    }
                } else if (!res.fries) {
                    // Fallback: detectar papas aunque no estén al inicio del fragmento,
                    // siempre que no sea una línea de cantidad ("2x ...").
                    const friesMatch = p.match(/\bPapas\s*(?::|\s)\s*([^,]+)/i);
                    if (friesMatch) {
                        res.fries = friesMatch[1].trim();
                    } else if (/Coca(?:-Cola)?/i.test(p)) {
                        // Detectar Coca-Cola en cualquier parte del texto
                        res.extras.push({ quantity: 1, name: 'Coca-Cola 3L' });
                    }
                } else if (/Coca(?:-Cola)?/i.test(p)) {
                    // Detectar Coca-Cola en cualquier parte del texto
                    res.extras.push({ quantity: 1, name: 'Coca-Cola 3L' });
                }
            });
            return res;
        }
        function renderBadges(list, color, orderId, itemIndex, subKey) {

                return `<span class="text-xs px-2 py-0.5 rounded-full border breakdown-item ${cls} ${isChecked ? 'checked' : ''}" onclick="event.stopPropagation(); toggleItemChecked('${orderId}', ${itemIndex}, '${key}')">${escapeHtml(v)}</span>`;

        function renderItemBreakdown(item, orderId, itemIndex) {
            const c = String(item.customizations || '').trim();

            // Sin customizaciones: mostrar al menos el checklist del combo si aplica
            if (!c) {
                const comboConfigEmpty = getComboConfig(item.name);
                if (!comboConfigEmpty) return '';
                return (() => {
                    const colorMap = { 'amber': 'yellow', 'purple': 'purple', 'blue': 'blue', 'green': 'green', 'red': 'red', 'orange': 'orange', 'pink': 'pink' };

                    return `
                        <div class="mt-2 p-3 rounded-lg border border-gray-700 bg-gray-800/60">
                            <div class="text-sm text-gray-300 font-semibold mb-2 flex items-center">

                                ${(comboConfigEmpty.items || []).map((comboItem, idx) => {
                                    const itemKey = `${comboConfigEmpty.key}_${comboItem.type}_${idx}`;

                                    </div>`;

                            </div>
                        </div>
                    `;
                })();
            }

            function shouldInlineComboSpecifications() {
                const specs = String(item && item.specifications || '').trim();
                if (!specs) return false;
                // Solo tiene sentido repartirlas cuando es un combo con múltiples partes
                return splitComboChoices(c).length > 1;
            }

            // Detectar si es un combo configurado
            const comboConfig = getComboConfig(item.name);
            const onionConfigName = comboConfig && Array.isArray(comboConfig.items)
                ? (comboConfig.items.find(it => it && it.type === 'onion-rings') || {}).name
                : null;
            const onionLabel = onionConfigName || 'Aros de Cebolla';

            // Si es combo: mantener checklist visual + también mostrar detalles (papas/salsas/etc.)
            const comboChecklistHtml = comboConfig ? (() => {
                return `
                    <div class="mt-2 p-3 rounded-lg border border-gray-700 bg-gray-800/60">
                        <div class="text-sm text-gray-300 font-semibold mb-2 flex items-center">
                            <i class="fas fa-${comboConfig.type === 'duo' ? 'users' : 'box'} text-${comboConfig.color}-400 mr-2"></i>
                            Elementos del ${comboConfig.name}:
                        </div>
                        <div class="space-y-2">
                            ${comboConfig.items.map((comboItem, idx) => {
                                const itemKey = `${comboConfig.key}_${comboItem.type}_${idx}`;
                                const isChecked = isItemChecked(orderId, itemIndex, itemKey);
                                const colorMap = {
                                    'amber': 'yellow',
                                    'purple': 'purple',
                                    'blue': 'blue',
                                    'green': 'green',
                                    'red': 'red',
                                    'orange': 'orange',
                                    'pink': 'pink'
                                };
                                const badgeColor = colorMap[comboConfig.color] || 'gray';
                                return `
                                    <div class="flex items-center space-x-2">
                                        <span class="text-xs text-gray-400 font-medium">${comboItem.icon} ${comboItem.name}:</span>
                                        <span class="text-xs px-2 py-0.5 rounded-full border bg-green-900/40 text-green-300 border-green-700 breakdown-item ${isChecked ? 'checked' : ''}" onclick="event.stopPropagation(); toggleItemChecked('${orderId}', ${itemIndex}, '${itemKey}')">Listo</span>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            })() : '';
            
            let detailsHtml = '';

            if (splitComboChoices(c).length > 1) {
                const choices = splitComboChoices(c).map(parseChoiceText);
                const includePieces = choices.filter(ch => ch.includeLine || /^Incluye/i.test(ch.name));
                const normalChoices = choices.filter(ch => !(ch.includeLine || /^Incluye/i.test(ch.name)));

                // Repartir especificaciones por elección (Hamburguesa 1, 2, etc.)
                const rawSpecs = String(item && item.specifications || '').trim();
                const specsParts = rawSpecs
                    ? rawSpecs.split('|').map(s => stripSpecificationPrefixOne(s)).filter(Boolean)
                    : [];
                const choiceSpecs = normalChoices.map((_, idx) => specsParts[idx] || '');

                // Aggregate included details
                const friesBadges = [];
                const sauceBadges = [];
                const drinkBadges = [];
                let hasOnion = false;
                includePieces.forEach(ch => {
                    if (ch.fries) friesBadges.push(friesLabelForContext(item, ch.fries, ch.portionGrams, { comboKey: comboConfig && comboConfig.key }));
                    if (ch.sauce) sauceBadges.push(ch.sauce);
                    if (ch.drinks && ch.drinks.length) drinkBadges.push(...ch.drinks);
                    if (ch.onionRings) hasOnion = true;
                });

                return `
                    <div class="mt-2 space-y-2">
                        ${normalChoices.map((ch, chIdx) => { 
                                const isHotdog = /^Hot\s*Dog/i.test(ch.name);
                                const icon = isHotdog ? '🌭' : '🍔';
                                const displayName = escapeHtml(
                                    ch.name.replace(/^Hamburguesa\s*(\d+\s*)?:\s*/i, '')
                                           .replace(/^Hot\s*Dog\s*(\d+\s*)?:\s*/i, '')
                                           .trim() || ch.name
                                );
                                return `
                            <div class="p-2 rounded-lg border border-gray-600 bg-gray-700" style="background:#1e293b;border-color:#374151;">
                                <div class="text-sm font-semibold" style="color:#f1f5f9;">${icon} ${ch.qty}x ${displayName}</div>
                                ${(shouldInlineComboSpecifications() && choiceSpecs[chIdx]) ? `<div class=\"mt-1 text-xs md:text-sm text-red-600 font-extrabold\">${escapeHtml(choiceSpecs[chIdx])}</div>` : ''}
                                ${ch.toppings && ch.toppings.length ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Toppings:</span>${renderBadges(ch.toppings, 'amber', orderId, itemIndex, 'toppings_' + chIdx)}</div>` : ''}
                                ${ch.fries ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Papas:</span>${renderBadges([friesLabelForContext(item, ch.fries, ch.portionGrams, { comboKey: comboConfig && comboConfig.key })], 'blue', orderId, itemIndex, 'fries_' + chIdx)}</div>` : ''}
                                ${ch.sauce ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Salsa:</span>${renderBadges([ch.sauce], 'pink', orderId, itemIndex, 'sauce_' + chIdx)}</div>` : ''}
                                ${ch.onionRings ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Acompañamientos:</span>${renderBadges([onionLabel], 'green', orderId, itemIndex, 'onion_' + chIdx)}</div>` : ''}
                                ${ch.extras && ch.extras.length ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Extras:</span>${renderBadges(ch.extras.map(e => `${e.quantity}x ${e.name}`), 'amber', orderId, itemIndex, 'extras_' + chIdx)}</div>` : ''}
                            </div>
                        `; }).join('')}
                        ${comboChecklistHtml}
                        ${includePieces.length ? `
                            <div class=\"p-3 rounded-lg border border-gray-700 bg-gray-800/60\">
                                <div class=\"text-sm text-gray-300 font-semibold mb-2 flex items-center\">
                                    <i class=\"fas fa-box text-amber-600 mr-2\"></i>
                                    ${comboConfig ? `Elementos del ${comboConfig.name}:` : 'Incluye:'}
                                </div>
                                <div class=\"space-y-2\">
                                    ${friesBadges.length ? `<div class=\"flex items-center space-x-2\"><span class=\"text-xs text-gray-400 font-medium\">🍟 Papas:</span>${renderBadges(friesBadges, 'blue', orderId, itemIndex, 'include_fries')}</div>` : ''}
                                    ${sauceBadges.length ? `<div class=\"flex items-center space-x-2\"><span class=\"text-xs text-gray-400 font-medium\">🥫 Salsa:</span>${renderBadges([sauceBadges[0]], 'pink', orderId, itemIndex, 'include_sauce')}</div>` : ''}
                                    ${hasOnion ? `<div class=\"flex items-center space-x-2\"><span class=\"text-xs text-gray-400 font-medium\">🧅 ${escapeHtml(onionLabel)}:</span>${renderBadges(['Listo'], 'green', orderId, itemIndex, 'include_onion')}</div>` : ''}
                                    ${drinkBadges.length ? `<div class=\"flex items-center space-x-2\"><span class=\"text-xs text-gray-400 font-medium\">🥤 Coca-Cola 3L:</span>${renderBadges(['Listo'], 'green', orderId, itemIndex, 'include_drinks')}</div>` : ''}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            // Para items individuales o combos simples
            const d = parseSingleDetails(c);
            
            return `
                <div class="mt-1">
                    ${d.toppings && d.toppings.length ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Toppings:</span>${renderBadges(d.toppings, 'amber', orderId, itemIndex, 'toppings')}</div>` : ''}
                    ${d.fries ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Papas:</span>${renderBadges([friesLabelForContext(item, d.fries, d.portionGrams, { comboKey: comboConfig && comboConfig.key })], 'blue', orderId, itemIndex, 'fries')}</div>` : ''}
                    ${d.sauce ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Salsa:</span>${renderBadges([d.sauce], 'pink', orderId, itemIndex, 'sauce')}</div>` : ''}
                    ${d.onionRings ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Acompañamientos:</span>${renderBadges(['Aros de Cebolla'], 'green', orderId, itemIndex, 'onion')}</div>` : ''}
                    ${d.extras && d.extras.length ? `<div class=\"text-xs text-gray-400 mt-1\"><span class=\"font-semibold\">Extras:</span>${renderBadges(d.extras.map(e => `${e.quantity}x ${e.name}`), 'amber', orderId, itemIndex, 'extras')}</div>` : ''}
                </div>
            `;
        }

        // === Checklist Functions ===
        function getCheckedItems(orderId) {
            const key = `checkedItems_${orderId}`;
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : {};
        }

        function saveCheckedItems(orderId, checkedItems) {
            const key = `checkedItems_${orderId}`;
            localStorage.setItem(key, JSON.stringify(checkedItems));
        }

        function toggleItemChecked(orderId, itemIndex, subItemKey = null) {
            const checkedItems = getCheckedItems(orderId);
            const key = subItemKey ? `${itemIndex}_${subItemKey}` : itemIndex.toString();
            checkedItems[key] = !checkedItems[key];
            saveCheckedItems(orderId, checkedItems);
            displayOrders(); // Refresh display
        }

        function isItemChecked(orderId, itemIndex, subItemKey = null) {
            const checkedItems = getCheckedItems(orderId);
            const key = subItemKey ? `${itemIndex}_${subItemKey}` : itemIndex.toString();
            return !!checkedItems[key];
        }

        // Inicializar la página
        document.addEventListener('DOMContentLoaded', function() {
            // Cargar combos (no depende de Firebase)
            loadComboConfigurations();

            // Esperar a que Firebase (módulo) exponga window.firebaseOrderManager
            waitForFirebaseAndInit();
        });

        function waitForFirebaseAndInit(attempt = 0) {
            // Ya conectado
            if (unsubscribeOrders) return;

            if (window.firebaseOrderManager && typeof window.firebaseOrderManager.onOrdersChange === 'function') {
                initializeFirebase();
                return;
            }

            // Intentar por ~15s (60 * 250ms)
            if (attempt === 0) {
                console.log('⏳ Esperando Firebase...');
                showNotification('Conectando con Firebase...', 'success');
            }

            if (attempt < 60) {
                setTimeout(() => waitForFirebaseAndInit(attempt + 1), 250);
                return;
            }

            // Si no apareció Firebase, usar modo local
            console.warn('⚠️ Firebase no disponible tras esperar. Usando modo local.');
            showNotification('Firebase no disponible. Usando modo local.', 'error');
            loadOrdersFromLocalStorage();
            setupAutoRefresh();
        }

        // Inicializar Firebase
        function initializeFirebase() {
            if (unsubscribeOrders) return;

            if (window.firebaseOrderManager) {
                console.log('🔥 Conectando con Firebase...');

                // Si veníamos de modo local, apagar auto-refresh
                if (localAutoRefreshId) {
                    try { clearInterval(localAutoRefreshId); } catch (_) {}
                    localAutoRefreshId = null;
                }
                
                // Configurar listener en tiempo real
                unsubscribeOrders = window.firebaseOrderManager.onOrdersChange((firebaseOrders) => {
                    console.log('📥 Pedidos recibidos de Firebase:', firebaseOrders.length);
                    orders = firebaseOrders;
                    // Detectar llegada de nuevos pedidos y disparar alerta
                    syncNewOrderNotifier(orders);
                    displayOrders();
                    updateStats();
                });
                
                showNotification('Conectado a Firebase - Datos en tiempo real', 'success');
            } else {
                console.warn('⚠️ Firebase no disponible, usando datos locales');
                loadOrdersFromLocalStorage();
                setupAutoRefresh();
            }
        }

        // Cargar órdenes desde localStorage (fallback)
        function loadOrdersFromLocalStorage() {
            const savedOrders = localStorage.getItem('orders');
            if (savedOrders) {
                orders = JSON.parse(savedOrders);
            } else {
                // Crear órdenes de ejemplo si no hay datos
                createSampleOrders();
            }
            displayOrders();
            updateStats();
        }

        // Guardar órdenes en localStorage (fallback)
        function saveOrdersToLocalStorage() {
            localStorage.setItem('orders', JSON.stringify(orders));
        }

        // Agregar nueva orden (llamada desde paginaburger.html - mantener compatibilidad)
        function addOrder(orderData) {
            if (window.firebaseOrderManager) {
                // Usar Firebase
                window.firebaseOrderManager.addOrder(orderData)
                    .then((orderId) => {
                        console.log('✅ Pedido agregado a Firebase:', orderId);
                        showNotification('Nuevo pedido recibido!', 'success');
                        playNotificationSound();
                        startNewOrderAlert();
                    })
                    .catch((error) => {
                        console.error('❌ Error al agregar pedido a Firebase:', error);
                        showNotification('Error al procesar pedido', 'error');
                    });
            } else {
                // Fallback a localStorage
                const newOrder = {
                    id: Date.now().toString(),
                    timestamp: new Date().toISOString(),
                    status: 'pending',
                    customer: orderData.customer,
                    items: orderData.items,
                    total: orderData.total,
                    notes: orderData.notes || '',
                    estimatedTime: calculateEstimatedTime(orderData.items),
                    confirmed: false,
                    onWaySent: false,
                    arrivedSent: false,
                    paid: false,
                    paidAt: null
                };
                
                orders.unshift(newOrder);
                saveOrdersToLocalStorage();
                displayOrders();
                updateStats();
                showNotification('Nuevo pedido recibido!', 'success');
                playNotificationSound();
                startNewOrderAlert();
            }
        }

        // Determinar si una orden está cancelada (por status o bandera)
        function isOrderCanceled(order) {
            if (!order) return false;
            if (order.canceled || order.cancelled) return true;
            const s = String(order.status || '').toLowerCase();
            return s.includes('cancel'); // 'canceled', 'cancelled', 'cancelado'
        }

        // Mostrar órdenes
        function displayOrders() {
            const container = document.getElementById('orders-container');
            const emptyState = document.getElementById('empty-state');
            
            // Ocultar siempre las órdenes canceladas
            let filteredOrders = orders.filter(o => !isOrderCanceled(o) && String(o.status || '').toLowerCase() !== 'delivered');
            if (currentFilter !== 'all') {
                filteredOrders = filteredOrders.filter(order => order.status === currentFilter);
            }

            if (filteredOrders.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.innerHTML = filteredOrders.map(order => createOrderCard(order)).join('');
        }

        // Crear tarjeta de orden
        function createOrderCard(order) {
            const statusInfo = getStatusInfo(order.status);
            const timeAgo = getTimeAgo(order.timestamp);
            const priorityClass = getTimePriorityClass(order.timestamp);
            const customer = order && order.customer ? order.customer : {};
            const items = Array.isArray(order.items) ? order.items : [];

            const paymentMethodRaw = String(order.paymentMethod || '').trim();
            const isOnlinePay = /pago\s*en\s*l[ií]nea/i.test(paymentMethodRaw);
            const isPaid = !!order.paid;
            const paymentStatusText = isOnlinePay
                ? (isPaid ? 'Pagado' : 'Pago pendiente')
                : (isPaid ? 'Pagado' : 'Pendiente de cobro');
            const paymentBadgeClass = isPaid
                ? 'bg-emerald-950 border-emerald-500/40 text-emerald-200'
                : (isOnlinePay ? 'bg-amber-950 border-amber-500/40 text-amber-200' : 'bg-slate-900 border-slate-600/40 text-slate-200');
            const paymentMethodText = paymentMethodRaw || (isOnlinePay ? 'Pago en línea' : '—');

            return `
                <div class="order-card card-modern ${priorityClass}" data-order-id="${order.id}" data-status="${order.status}">
                    <button class="order-delete-btn" onclick="deleteOrder('${order.id}')" title="Eliminar pedido">
                        <i class="fas fa-trash"></i>
                    </button>
                    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                        <!-- Order Info -->
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-3">
                                <div class="flex items-center space-x-3">
                                    <h3 class="text-lg font-bold text-gray-100">Pedido #${String(order.id || '').slice(-6)}</h3>
                                    <span class="status-badge ${statusInfo.class}">${statusInfo.text}</span>
                                </div>
                                <div class="text-sm text-gray-400">${timeAgo}</div>
                            </div>

                            <!-- Customer Info -->
                            <div class="customer-info mb-4">
                                <div class="label mb-1">Cliente</div>
                                <div class="flex items-center space-x-3 mb-2">
                                    <i class="fas fa-user text-yellow-600"></i>
                                    <span class="font-extrabold text-red-600">${escapeHtml(customer.name || '')}</span>
                                </div>
                                <div class="flex items-center space-x-3 mb-2">
                                    <i class="fas fa-phone text-yellow-600"></i>
                                    <span class="value-muted">${escapeHtml(customer.phone || '')}</span>
                                </div>
                                <div class="flex items-center space-x-3">
                                    <i class="fas fa-map-marker-alt text-yellow-600"></i>
                                    <button type="button" class="address-toggle" onclick="toggleAddressVisibility('${order.id}')">Ver dirección</button>
                                </div>
                                <div id="address-${order.id}" class="mt-1 text-xs value-muted hidden">
                                    ${escapeHtml(customer.address || '')}
                                </div>
                            </div>

                            <!-- Order Items -->
                            <div class="mb-4 order-products">
                                <h4 class="font-semibold text-gray-100 mb-2">
                                    <i class="fas fa-shopping-bag text-gray-300 mr-2"></i>
                                    Productos (${items.length} items)
                                </h4>
                                <div class="space-y-2">
                                    ${items.map((item, itemIndex) => {
                                        const rawId = item.productId != null ? item.productId : (item.id != null ? item.id : (item.baseItemId != null ? item.baseItemId : item.itemId));
                                        const idStr = rawId != null ? String(rawId).trim() : '';
                                        const idLabel = idStr ? `ID: ${idStr}` : '';
                                        const shouldInlineSpecs = Boolean(item && item.specifications && splitComboChoices(String(item.customizations || '')).length > 1);
                                        return `
                                        <div class="order-item ${isItemChecked(order.id, itemIndex) ? 'checked' : ''}" onclick="toggleItemChecked('${order.id}', ${itemIndex})">
                                            <div class="flex justify-between items-start gap-3">
                                                <div class="min-w-0 flex-1">
                                                    <div class="item-title">${Number(item.quantity || 1)}x ${escapeHtml(item.name || '')}${(() => { const g = getPapasGramaje(item.name); return g ? ` <span class="text-xs font-bold text-orange-400 ml-1">(${g})</span>` : ''; })()}</div>
                                                    <div class="checkmark"><i class="fas fa-check"></i></div>
                                                    ${(item.specifications && !shouldInlineSpecs) ? `<div class=\"mt-1 text-sm md:text-base text-red-400 font-extrabold spec-warning\">${escapeHtml(formatSpecificationsForDisplay(item.specifications))}</div>` : ''}
                                                    <div class="breakdown" onclick="event.stopPropagation()">${renderItemBreakdown(item, order.id, itemIndex)}</div>
                                                </div>
                                                <div class="text-right whitespace-nowrap">
                                                    <div class="item-price font-bold">$${Number(item.price || 0)}</div>
                                                    <div class=\"mt-1 text-lg font-extrabold ${idLabel ? 'text-emerald-300' : 'text-rose-300'}\">${idLabel || 'SIN ID'}</div>
                                                </div>
                                            </div>
                                        </div>
                                        `;
                                    }).join('')}
                                </div>
                                <div class="mt-3 pt-3 border-t border-gray-700">
                                    ${(() => {
                                        const subtotal = Number(order.subtotal || 0);
                                        const subtotalAfterDiscount = Number(order.subtotalAfterDiscount || 0);
                                        const deliveryFee = Number(order.deliveryFee || order.deliveryCost || 0);
                                        const storedTotal = Number(order.total || 0);

                                        let discountAmount = Number(order.discountAmount || 0);
                                        if ((!isFinite(discountAmount) || discountAmount <= 0) && isFinite(subtotal) && subtotal > 0 && isFinite(subtotalAfterDiscount) && subtotalAfterDiscount > 0 && subtotalAfterDiscount < subtotal) {
                                            discountAmount = Number((subtotal - subtotalAfterDiscount).toFixed(2));
                                        }
                                        if ((!isFinite(discountAmount) || discountAmount <= 0) && isFinite(subtotal) && subtotal > 0 && isFinite(storedTotal) && storedTotal > 0) {
                                            const inferred = (subtotal + deliveryFee) - storedTotal;
                                            if (isFinite(inferred) && inferred > 0.01) discountAmount = Number(inferred.toFixed(2));
                                        }
                                        if (!isFinite(discountAmount) || discountAmount < 0) discountAmount = 0;
                                        discountAmount = Math.min(discountAmount, isFinite(subtotal) ? subtotal : discountAmount);

                                        const discountReason = String(order.discountReason || order.rewardLabel || '').trim();
                                        const discountCode = String(order.discountCode || '').trim();
                                        const effectiveTotal = (isFinite(subtotal) && subtotal > 0)
                                            ? Number((subtotal - discountAmount + deliveryFee).toFixed(2))
                                            : (isFinite(storedTotal) ? storedTotal : 0);
                                        let breakdown = '';

                                                </div>
                                            `;
                                        }
                                        
                                        if (discountAmount > 0) {
                                            breakdown += `
                                                <div class="flex justify-between items-center text-sm mb-1">
                                                    <span class="text-green-300">Descuento${discountReason ? ` (${escapeHtml(discountReason)})` : ''}:</span>
                                                    <span class="text-green-300 font-medium">-$${discountAmount.toFixed(2)}</span>
                                                </div>
                                            `;
                                        }

                                        if (discountCode) {
                                            breakdown += `

        // Calcular clase de prioridad temporal según minutos transcurridos
        function getTimePriorityClass(timestamp) {
            try {
                const now = new Date();
                const orderTime = new Date(timestamp);
                const diffMs = now - orderTime;
                const diffMins = Math.floor(diffMs / 60000);

                if (!Number.isFinite(diffMins) || diffMins < 0) return 'priority-fresh';
                if (diffMins < 5) return 'priority-fresh';
                if (diffMins < 10) return 'priority-warning';
                return 'priority-urgent';
            } catch (_) {
                return 'priority-fresh';
            }
        }

                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')

            } catch (_) {
                return String(s || '').toLowerCase().replace(/\s+/g, '');
            }
        }
