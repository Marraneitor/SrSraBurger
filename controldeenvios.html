        function buildPrintableTicketHtml(order, qrOverrideSrc, mode = 'customer') {
            const now = new Date();
            const fechaCompacta = (() => {
                try {
                    const dia = now.toLocaleDateString('es-MX', {
                        timeZone: 'America/Mexico_City',
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric'
                    });
                    const hora = now.toLocaleTimeString('es-MX', {
                        timeZone: 'America/Mexico_City',
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true,
                    });
                    return `${dia} ${hora}`;
                } catch (_) {
                    return now.toISOString().slice(0, 16).replace('T', ' ');
                }
            })();

            const customer = order.customer || order.cliente || {};
            const items = Array.isArray(order.items) ? order.items : [];

            // Ticket más ligero: más caracteres por línea (font más pequeño) = menos saltos = menos spool
            const PAPER_CHARS = 36; // ancho aprox. en monospace para 58mm
            const SEP = '-'.repeat(PAPER_CHARS);
            const padRight = (s, n) => {
                const str = String(s ?? '');
                if (str.length >= n) return str.slice(0, n);
                return str + ' '.repeat(n - str.length);
            };
            const center = (s) => {
                const str = String(s ?? '').trim();
                if (!str) return '';
                if (str.length >= PAPER_CHARS) return str.slice(0, PAPER_CHARS);
                const left = Math.floor((PAPER_CHARS - str.length) / 2);
                const right = PAPER_CHARS - str.length - left;
                return ' '.repeat(left) + str + ' '.repeat(right);
            };
            const lr = (left, right) => {
                const L = String(left ?? '');
                const R = String(right ?? '');
                const gap = Math.max(1, PAPER_CHARS - L.length - R.length);
                const line = (L + ' '.repeat(gap) + R);
                return line.length > PAPER_CHARS ? line.slice(0, PAPER_CHARS) : line;
            };
            const wrap = (text, width) => {
                const t = String(text ?? '').replace(/\s+/g, ' ').trim();
                if (!t) return [];
                const lines = [];
                let rest = t;
                while (rest.length > width) {
                    let cut = rest.lastIndexOf(' ', width);
                    if (cut < 10) cut = width;
                    lines.push(rest.slice(0, cut).trim());
                    rest = rest.slice(cut).trim();
                }
                if (rest) lines.push(rest);
                return lines;
            };
            const money = (v) => {
                const n = Number(v || 0);
                if (!isFinite(n)) return '0';
                const hasCents = Math.abs(n % 1) > 0.001;
                return hasCents ? n.toFixed(2) : String(Math.round(n));
            };

            const subtotalNumber = Number(order.subtotal || 0);
            const subtotalAfterDiscountNumber = Number(order.subtotalAfterDiscount || 0);
            const deliveryFeeNumber = Number(order.deliveryFee || order.deliveryCost || 0);
            const storedTotalNumber = Number(order.total || 0);

            let discountAmountNumber = Number(order.discountAmount || 0);
            if ((!isFinite(discountAmountNumber) || discountAmountNumber <= 0) && isFinite(subtotalNumber) && subtotalNumber > 0 && isFinite(subtotalAfterDiscountNumber) && subtotalAfterDiscountNumber > 0 && subtotalAfterDiscountNumber < subtotalNumber) {
                discountAmountNumber = Number((subtotalNumber - subtotalAfterDiscountNumber).toFixed(2));
            }
            if ((!isFinite(discountAmountNumber) || discountAmountNumber <= 0) && isFinite(subtotalNumber) && subtotalNumber > 0 && isFinite(storedTotalNumber) && storedTotalNumber > 0) {
                const inferred = (subtotalNumber + deliveryFeeNumber) - storedTotalNumber;
                if (isFinite(inferred) && inferred > 0.01) discountAmountNumber = Number(inferred.toFixed(2));
            }
            if (!isFinite(discountAmountNumber) || discountAmountNumber < 0) discountAmountNumber = 0;
            discountAmountNumber = Math.min(discountAmountNumber, isFinite(subtotalNumber) ? subtotalNumber : discountAmountNumber);

            const totalNumber = (isFinite(subtotalNumber) && subtotalNumber > 0)
                ? Number((subtotalNumber - discountAmountNumber + deliveryFeeNumber).toFixed(2))
                : (isFinite(storedTotalNumber) ? storedTotalNumber : 0);

            const discountReason = String(order.discountReason || order.rewardLabel || '').trim();
            const discountCode = String(order.discountCode || '').trim();

            // Determinar cómo interpretar precios en items (unitario vs total por línea)
            // para evitar duplicar multiplicaciones (casos legacy / datos mezclados).
            const ticketPriceMode = (() => {
                if (!isFinite(subtotalNumber) || subtotalNumber <= 0 || !items.length) return 'AUTO';

                let sumUnitTimesQty = 0;
                let sumPriceTimesQty = 0;
                let sumPriceIsLine = 0;
                let sumUnitIsLine = 0;

                items.forEach((it) => {
                    const q = Number(it.quantity || 1) || 1;
                    const p = Number(it.price || 0);
                    const u = Number(it.unitPrice || 0);
                    if (isFinite(u) && u > 0) {
                        sumUnitTimesQty += u * q;
                        sumUnitIsLine += u;
                    }
                    if (isFinite(p) && p > 0) {
                        sumPriceTimesQty += p * q;
                        sumPriceIsLine += p;
                    }
                });

                const candidates = [
                    { mode: 'UNIT_X_QTY', value: sumUnitTimesQty },
                    { mode: 'PRICE_X_QTY', value: sumPriceTimesQty },
                    { mode: 'PRICE_IS_LINE', value: sumPriceIsLine },
                    { mode: 'UNIT_IS_LINE', value: sumUnitIsLine },
                ].filter(c => isFinite(c.value) && c.value > 0);

                if (!candidates.length) return 'AUTO';

                candidates.sort((a, b) => {
                    const da = Math.abs(a.value - subtotalNumber);
                    const db = Math.abs(b.value - subtotalNumber);
                    return da - db;
                });

                // Aceptar el mejor candidato si se aproxima razonablemente al subtotal.
                const best = candidates[0];
                const relErr = Math.abs(best.value - subtotalNumber) / Math.max(1, subtotalNumber);
                return relErr <= 0.05 ? best.mode : 'AUTO'; // tolerancia 5%
            })();
            const pointsGained = (() => {
                const n = Number(totalNumber || 0);
                if (!isFinite(n) || n <= 0) return 0;
                // Consistente con el sistema actual: 1 punto cada $10 gastados (~10% del total)
                return Math.floor(n / 10);
            })();

            // Nota: se removió QR del ticket para aligerar el spool y evitar bloqueos en térmicas.

            // ── TICKET DE CLIENTE: formato térmico 58mm ──────────────
            if (mode === 'customer') {
                const custLines = [];

                const orderShort = (() => {
                    const num = (order.orderNumber || '').toString().trim();
                    if (num) return num;
                    if (order.id) return String(order.id).slice(-6).toUpperCase();
                    return '---';
                })();

                const paymentMethod = String(order.paymentMethod || order.payment || order.metodoPago || 'Efectivo');

                // Extraer monto pagado y cambio desde el campo notes (ej: "Pago: $100 | Cambio: $10")
                const notesRaw = String(order.notes || '');
                let pagoCon = 0;
                let cambioCal = 0;
                const pagoMatch = notesRaw.match(/Pago(?:\s+con)?\s*:\s*\$?([\d.,]+)/i);
                const cambioMatch = notesRaw.match(/Cambio\s*:\s*\$?([\d.,]+)/i);
                if (pagoMatch) pagoCon = parseFloat(pagoMatch[1].replace(',', '.')) || 0;
                if (cambioMatch) cambioCal = parseFloat(cambioMatch[1].replace(',', '.')) || 0;
                // Fallback: calcular cambio si hay monto ingresado y método es efectivo
                if (!cambioCal && pagoCon > 0 && totalNumber > 0 && /efectivo/i.test(paymentMethod)) {
                    cambioCal = Math.max(0, pagoCon - totalNumber);
                }

                const deliveryType = String(order.deliveryType || 'pickup').toLowerCase();
                const isDelivery = deliveryType === 'delivery';
                const isLocal = deliveryType === 'local';
                const entregaLabel = isDelivery ? 'Domicilio' : isLocal ? 'Consumo Local' : 'Recoger en local';

                // ── ENCABEZADO ──
                custLines.push(lr(`Orden #${orderShort}`, fechaCompacta));
                custLines.push('');

                // ── CLIENTE ──
                const cust = order.customer || order.cliente || {};
                const custName = String(cust.name || '').trim();
                const custPhone = String(cust.phone || '').trim();
                const custAddr = String(cust.address || '').trim();
                if (custName && custName.toLowerCase() !== 'consumo local') {
                    custLines.push(`CLIENTE: ${custName}`);
                }
                if (custPhone && custPhone !== '---') {
                    custLines.push(`TEL: ${custPhone}`);
                }
                if (isDelivery && custAddr) {
                    wrap(`DIR: ${custAddr}`, PAPER_CHARS).forEach(l => custLines.push(l));
                }
                custLines.push(`ENTREGA: ${entregaLabel}`);
                custLines.push('');

                // ── PRODUCTOS ──
                custLines.push('PRODUCTOS');
                custLines.push('');

                items.forEach((item) => {
                    const qty = Number(item.quantity || 1) || 1;
                    const name = String(item.name || 'Producto').trim();
                    const p = Number(item.price || 0);
                    const u = Number(item.unitPrice || 0);

                    let lineTotal = 0;
                    if (ticketPriceMode === 'UNIT_X_QTY') {
                        lineTotal = ((isFinite(u) && u > 0) ? u : (isFinite(p) ? p : 0)) * qty;
                    } else if (ticketPriceMode === 'PRICE_X_QTY') {
                        lineTotal = (isFinite(p) ? p : 0) * qty;
                    } else if (ticketPriceMode === 'PRICE_IS_LINE') {
                        lineTotal = isFinite(p) ? p : 0;
                    } else if (ticketPriceMode === 'UNIT_IS_LINE') {
                        lineTotal = (isFinite(u) && u > 0) ? u : (isFinite(p) ? p : 0);
                    } else {
                        const lineCandidate = isFinite(p) && p > 0 ? p : (isFinite(u) && u > 0 ? u : 0);
                        const unitCandidate = (isFinite(u) && u > 0) ? u : (isFinite(p) ? p : 0);
                        const unitTimesQty = unitCandidate * qty;
                        lineTotal = (qty > 1 && lineCandidate > 0 && unitTimesQty > 0 && lineCandidate <= unitTimesQty)
                            ? lineCandidate : (unitTimesQty > 0 ? unitTimesQty : lineCandidate);
                    }

                    const right = '$' + money(lineTotal);
                    const leftBase = `${qty}x ${name}`;
                    const maxLeft = Math.max(8, PAPER_CHARS - right.length - 1);
                    const nameLines = wrap(leftBase, maxLeft);
                    if (nameLines.length) {
                        custLines.push(lr(nameLines[0], right));
                        for (let i = 1; i < nameLines.length; i++) custLines.push('  ' + nameLines[i]);
                    } else {
                        custLines.push(lr(leftBase, right));
                    }

                    // Detalles del item (opcionales, breves)
                    const custom = String(item.customizations || '').trim();
                    const specs = String(item.specifications || '').trim();
                    const details = [custom, specs].filter(Boolean).join(' | ')
                        .split('|').map(s => s.trim()).filter(Boolean);
                    details.forEach(d => {
                        wrap(d, PAPER_CHARS - 2).forEach(dl => custLines.push('  ' + dl));
                    });
                });

                custLines.push('');

                // ── TOTALES ──
                if (subtotalNumber > 0) {
                    custLines.push(lr('Subtotal', '$' + money(subtotalNumber)));
                }
                if (discountAmountNumber > 0) {
                    let discLabel = 'Descuento';
                    if (discountCode) discLabel += ` (${discountCode})`;
                    custLines.push(lr(discLabel, '-$' + money(discountAmountNumber)));
                    if (discountReason) {
                        wrap('Motivo: ' + discountReason, PAPER_CHARS).forEach(l => custLines.push(l));
                    }
                }
                if (deliveryFeeNumber > 0) {
                    custLines.push(lr('Envio', '$' + money(deliveryFeeNumber)));
                }
                custLines.push('');
                custLines.push(lr('TOTAL', '$' + money(totalNumber)));
                custLines.push('');

                // ── PAGO ──
                custLines.push(lr('Metodo de pago', paymentMethod));
                if (pagoCon > 0) {
                    custLines.push(lr('Pago con', '$' + money(pagoCon)));
                }
                if (cambioCal > 0) {
                    custLines.push(lr('Su cambio', '$' + money(cambioCal)));
                }

                // ── NOTAS (sin info de descuento ya mostrada) ──
                const extraNotes = notesRaw
                    .replace(/Pago(?:\s+con)?\s*:\s*\$?[\d.,]+\s*\|?\s*/gi, '')
                    .replace(/Cambio\s*:\s*\$?[\d.,]+/gi, '')
                    .replace(/Descuento manual:.*$/mi, '')
                    .trim();
                if (extraNotes) {
                    custLines.push('');
                    wrap('Nota: ' + extraNotes, PAPER_CHARS).forEach(l => custLines.push(l));
                }

                // ── FOOTER ──
                custLines.push('');
                custLines.push(center('GRACIAS POR SU PREFERENCIA'));
                custLines.push(center('Vuelva pronto!'));
                custLines.push('');

                const custHeightMm = (() => {
                    const lineCount = custLines.length;
                    const mmPerLine = 3.55;
                    const raw = 18 + (lineCount * mmPerLine);
                    return Math.max(220, Math.min(900, Math.ceil(raw / 10) * 10));
                })();

                return buildPrintableTicketHtmlFromLines(custLines, custHeightMm, order, 'customer');
            }
            // ── FIN TICKET CLIENTE ─────────────────────────────────────────

            const lines = [];

            lines.push(SEP);
            lines.push(center(mode === 'kitchen' ? 'TICKET COCINA' : 'RECIBO DE COMPRA'));
            lines.push(SEP);

            if (mode !== 'kitchen') {
                const orderShort = (() => {
                    const num = (order.orderNumber || '').toString().trim();
                    if (num) return `#${num}`;
                    if (order.id) return `#${String(order.id).slice(-6)}`;
                    return '';
                })();

                if (orderShort) {
                    lines.push(lr(fechaCompacta, orderShort));
                } else {
                    lines.push(center(fechaCompacta));
                }
                lines.push(SEP);

                if (customer.name) lines.push(`CLIENTE: ${String(customer.name).trim()}`);
                if (customer.phone) lines.push(`TEL: ${String(customer.phone).trim()}`);
                if (customer.address) {
                    const addr = String(customer.address).replace(/\s+/g, ' ').trim();
                    const addrLines = wrap(`DIR: ${addr}`, PAPER_CHARS);
                    addrLines.forEach(a => lines.push(a));
                }
            } else {
                if (customer.name) lines.push(`CLIENTE: ${String(customer.name).trim()}`);
            }

            lines.push(SEP);
            lines.push('PRODUCTOS');
            lines.push(SEP);

            if (!items.length) {
                lines.push('(sin productos)');
            } else {
                items.forEach((item) => {
                    const qty = Number(item.quantity || 1) || 1;
                    const name = String(item.name || 'SIN NOMBRE').trim();

                    // Modo cocina: enfocado en preparación (burgers + especificaciones + elementos del combo)
                    if (mode === 'kitchen') {
                        const gramajeKitchen = getPapasGramaje(name);
                        const nameKitchen = gramajeKitchen ? `${name} (${gramajeKitchen})` : name;
                        const leftBaseKitchen = `${qty}x ${nameKitchen}`;
                        const nameLinesKitchen = wrap(leftBaseKitchen, PAPER_CHARS);
                        if (nameLinesKitchen.length) {
                            lines.push(nameLinesKitchen[0]);
                            for (let i = 1; i < nameLinesKitchen.length; i++) {
                                lines.push('  ' + nameLinesKitchen[i]);
                            }
                        } else {
                            lines.push(leftBaseKitchen);
                        }

                        const c = String(item.customizations || '').trim();
                        const isComboChoices = splitComboChoices(c).length > 1;

                        if (isComboChoices) {
                            const comboConfig = getComboConfig(name);
                            const onionConfigName = comboConfig && Array.isArray(comboConfig.items)
                                ? (comboConfig.items.find(it => it && it.type === 'onion-rings') || {}).name
                                : null;
                            const onionLabel = onionConfigName || 'Aros de Cebolla';

                            const choices = splitComboChoices(c).map(parseChoiceText);
                            const includePieces = choices.filter(ch => ch.includeLine || /^Incluye/i.test(ch.name));
                            const normalChoices = choices.filter(ch => !(ch.includeLine || /^Incluye/i.test(ch.name)));

                            const rawSpecs = String(item.specifications || '').trim();
                            const specsParts = rawSpecs
                                ? rawSpecs.split('|').map(s => stripSpecificationPrefixOne(s)).filter(Boolean)
                                : [];

                            normalChoices.forEach((ch, idx) => {
                                const spec = specsParts[idx] || '';
                                const isHotdog = /^Hot\s*Dog/i.test(ch.name);
                                const cleanName = ch.name
                                    .replace(/^Hamburguesa\s*(\d+\s*)?:\s*/i, '')
                                    .replace(/^Hot\s*Dog\s*(\d+\s*)?:\s*/i, '')
                                    .trim() || ch.name;
                                const itemIcon = isHotdog ? '🌭' : '🍔';
                                const choiceLabel = `${itemIcon} ${ch.qty}x ${cleanName}`;
                                const choiceLines = wrap(choiceLabel, PAPER_CHARS - 2);
                                choiceLines.forEach((cl) => lines.push('  ' + cl));
                                if (spec) {
                                    const specLines = wrap(spec, PAPER_CHARS - 4);
                                    specLines.forEach(sl => lines.push('    ' + sl));
                                }
                            });

                            const friesBadges = [];
                            const sauceBadges = [];
                            const drinkBadges = [];
                            let hasOnion = false;
                            includePieces.forEach(ch => {
                                if (ch.fries) friesBadges.push(`Tipo ${ch.fries}`);
                                if (ch.sauce) sauceBadges.push(ch.sauce);
                                if (ch.drinks && ch.drinks.length) drinkBadges.push(...ch.drinks);
                                if (ch.onionRings) hasOnion = true;
                            });

                            // Fallback: si el pedido es un combo conocido (por config) y no viene explícito en el texto,
                            // de todos modos debe imprimirse que incluye aros.
                            if (!hasOnion && comboConfig && Array.isArray(comboConfig.items)) {
                                const hasOnionCfg = comboConfig.items.some(ci => ci && ci.type === 'onion-rings');
                                if (hasOnionCfg) hasOnion = true;
                            }

                            if (friesBadges.length || sauceBadges.length || hasOnion || drinkBadges.length) {
                                lines.push('');
                                lines.push('  ELEMENTOS DEL COMBO:');
                                if (friesBadges.length) {
                                    const friesText = 'Papas: ' + friesBadges.join(', ');
                                    wrap(friesText, PAPER_CHARS - 4).forEach(fl => lines.push('    ' + fl));
                                }
                                if (sauceBadges.length) {
                                    const sauceText = 'Salsas: ' + sauceBadges.join(', ');
                                    wrap(sauceText, PAPER_CHARS - 4).forEach(sl => lines.push('    ' + sl));
                                }
                                if (hasOnion) {
                                    const onionText = 'Aros: ' + onionLabel;
                                    wrap(onionText, PAPER_CHARS - 4).forEach(ol => lines.push('    ' + ol));
                                }
                                if (drinkBadges.length) {
                                    const drinkText = 'Bebida: ' + Array.from(new Set(drinkBadges)).join(', ');
                                    wrap(drinkText, PAPER_CHARS - 4).forEach(dl => lines.push('    ' + dl));
                                }
                            }
                        } else {
                            const custom = String(item.customizations || '');
                            const specsFormatted = formatSpecificationsForDisplay(item.specifications || '');
                            const detailsKitchen = [custom, specsFormatted]
                                .filter(Boolean)
                                .join(' | ')
                                .split('|')
                                .map(s => s.trim())
                                .filter(Boolean);

                            detailsKitchen.forEach(d => {
                                const detailLines = wrap(d, PAPER_CHARS - 2);
                                detailLines.forEach(dl => lines.push('  - ' + dl));
                            });
                        }

                        return; // no continuar con el formato estándar de cliente
                    }

                    // Ticket estándar (cliente): incluye precios y totales
                    // Elegimos por pedido cómo interpretar item.price/unitPrice para que NO se dupliquen.
                    const p = Number(item.price || 0);
                    const u = Number(item.unitPrice || 0);

                    let lineTotal = 0;
                    let unitPrice = 0;

                    if (ticketPriceMode === 'UNIT_X_QTY') {
                        const base = (isFinite(u) && u > 0) ? u : (isFinite(p) ? p : 0);
                        unitPrice = base;
                        lineTotal = base * qty;
                    } else if (ticketPriceMode === 'PRICE_X_QTY') {
                        const base = isFinite(p) ? p : 0;
                        unitPrice = base;
                        lineTotal = base * qty;
                    } else if (ticketPriceMode === 'PRICE_IS_LINE') {
                        lineTotal = isFinite(p) ? p : 0;
                        unitPrice = qty > 0 ? (lineTotal / qty) : lineTotal;
                    } else if (ticketPriceMode === 'UNIT_IS_LINE') {
                        lineTotal = (isFinite(u) && u > 0) ? u : (isFinite(p) ? p : 0);
                        unitPrice = qty > 0 ? (lineTotal / qty) : lineTotal;
                    } else {
                        // AUTO (fallback): preferir total por línea si coincide con subtotal del pedido; si no, usar unitario.
                        const lineCandidate = isFinite(p) && p > 0 ? p : ((isFinite(u) && u > 0) ? u : 0);
                        const unitCandidate = (isFinite(u) && u > 0) ? u : (isFinite(p) ? p : 0);

                        // Heurística simple: si quantity>1 y lineCandidate/qty es "razonable" y unitCandidate*qty se ve inflado,
                        // preferir lineCandidate.
                        const unitTimesQty = unitCandidate * qty;
                        if (qty > 1 && lineCandidate > 0 && unitTimesQty > 0) {
                            const preferLine = lineCandidate <= unitTimesQty;
                            lineTotal = preferLine ? lineCandidate : unitTimesQty;
                        } else {
                            lineTotal = unitTimesQty > 0 ? unitTimesQty : lineCandidate;
                        }

                        unitPrice = qty > 0 ? (lineTotal / qty) : lineTotal;
                    }

                    const right = '$' + money(lineTotal);

                    const leftBase = `${qty}x ${name}`;
                    const maxLeft = Math.max(8, PAPER_CHARS - right.length - 1);
                    const nameLines = wrap(leftBase, maxLeft);
                    if (nameLines.length) {
                        lines.push(lr(nameLines[0], right));
                        for (let i = 1; i < nameLines.length; i++) {
                            lines.push('  ' + nameLines[i]);
                        }
                    } else {
                        lines.push(lr(`${qty}x`, right));
                    }

                    // Ticket ligero: omitimos "Precio c/u" (reduce líneas en tickets largos)

                    const itemKey = normalizeTicketName(name);
                    const custom = String(item.customizations || '');
                    const specs = String(item.specifications || '');
                    const details = [custom, specs]
                        .filter(Boolean)
                        .join(' | ')
                        .split('|')
                        .map(s => s.trim())
                        .filter(Boolean);

                    // Normalizar aros en combos
                    if (itemKey.includes('combofamiliar')) {
                        for (let i = details.length - 1; i >= 0; i--) {
                            if (/aros/i.test(details[i])) details.splice(i, 1);
                        }
                        details.push('Aros de Cebolla Extragrandes');
                    } else if (itemKey.includes('comboamigos')) {
                        for (let i = details.length - 1; i >= 0; i--) {
                            if (/aros/i.test(details[i])) details.splice(i, 1);
                        }
                        details.push('Aros de Cebolla Medianas');
                    }

                    // Extras de combos
                    const extra = comboExtraTicketLines(item);
                    extra.forEach(x => {
                        const exists = details.some(d => d.toLowerCase().includes(String(x).toLowerCase()));
                        if (!exists) details.push(x);
                    });

                    details.forEach(d => {
                        const detailLines = wrap(`- ${d}`, PAPER_CHARS - 2);
                        detailLines.forEach(dl => lines.push('  ' + dl));
                    });
                });
            }

            if (mode !== 'kitchen') {
                lines.push(SEP);
                
                // Mostrar desglose de totales
                const subtotal = subtotalNumber;
                const discountAmount = discountAmountNumber;
                const deliveryFee = deliveryFeeNumber;
                
                if (subtotal > 0) {
                    lines.push(lr('Subtotal', '$' + money(subtotal)));
                }
                
                if (discountAmount > 0) {
                    lines.push(lr('Descuento', '-$' + money(discountAmount)));
                    if (discountCode) {
                        lines.push(lr('Cupon', discountCode));
                    }
                    if (discountReason) {
                        wrap('Motivo: ' + discountReason, PAPER_CHARS).forEach(x => lines.push(x));
                    }
                }
                
                if (deliveryFee > 0) {
                    lines.push(lr('Envio', '$' + money(deliveryFee)));
                }
                
                lines.push(SEP);
                lines.push(lr('TOTAL', '$' + money(totalNumber)));
                lines.push(SEP);
            }

            // Exponer las líneas para poder imprimir por partes si el driver se traba con tickets largos
            // (algunas térmicas imprimen solo una parte del spool y se bloquean).
            try {
                order.__sr_ticketLines = Array.isArray(lines) ? lines.slice() : null;
            } catch (_) {}

            // Estimar altura para evitar paginación (la mayoría de térmicas fallan al intentar 2+ páginas)
            const estimatedHeightMm = (() => {
                try {
                    const lineCount = Array.isArray(lines) ? lines.length : 0;
                    // font más chico: menos mm por línea
                    const mmPerLine = 3.55;
                    const base = (mode === 'kitchen') ? 18 : 28; // padding + encabezado
                    const raw = base + (lineCount * mmPerLine);
                    const rounded = Math.ceil(raw / 10) * 10;
                    // Rangos seguros: ni muy corto (paginación) ni enorme (algunos drivers se traban)
                    return Math.max(220, Math.min(900, rounded));
                } catch (_) {
                    return 300;
                }
            })();

            const safe = lines.map(l => escapeHtml(l)).join('\n');
                        return buildPrintableTicketHtmlFromLines(lines, estimatedHeightMm, order, mode);
                }

                function buildPrintableTicketHtmlFromLines(lines, estimatedHeightMm, order, mode = 'customer') {
                        const safe = (Array.isArray(lines) ? lines : []).map(l => escapeHtml(l)).join('\n');
                        const branding = mode === 'customer' ? getTicketBranding() : null;
                        const brandingHtml = branding ? `
            <div class="ticket-brand-header">
                ${branding.logoHtml ? `<div class="ticket-brand-logo">${branding.logoHtml}</div>` : ''}
                <div class="ticket-brand-title">${escapeHtml(branding.title)}</div>
                ${branding.subtitle ? `<div class="ticket-brand-subtitle">${escapeHtml(branding.subtitle)}</div>` : ''}
            </div>` : '';

                    // Ticket ligero: sin <base>, sin fuentes externas, sin QR, sin sombras.

                        const heightMm = (isFinite(Number(estimatedHeightMm)) && Number(estimatedHeightMm) > 0)
                                ? Number(estimatedHeightMm)
                                : 300;

                        return `
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ticket ${escapeHtml(String(order.id || ''))}</title>
    <style>
      /* Ticket 58mm (área útil ~48mm). Diseñado para no cortarse. */
            /* Algunos drivers (ej. XP-58) fallan con 'auto' en el alto */

      html, body { background: #fff; color: #000; }
      body {
        margin: 0;
        padding: 0;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

        width: 58mm;
        margin: 0 auto;
                padding: 3mm 3mm;
        box-sizing: border-box;
      }
            .ticket-brand-header {
                text-align: center;
                padding-bottom: 1.8mm;

            }

            }

                letter-spacing: 0.5px;
                margin-top: 0.8mm;
            }
      pre {
                margin: 0;
                                font-size: 12.2px;
                                line-height: 1.16;
        white-space: pre-wrap;
        word-break: break-word;
      }
                        @media print {
                                /* Evitar que el navegador inserte cortes raros */
                                pre { break-inside: avoid; page-break-inside: avoid; }
                        }
    </style>
  </head>
  <body>
        <div class="paper">
                ${brandingHtml}
                        <pre>${safe}</pre>
        </div>
  </body>
</html>`;
        }

        function printOrderTicket(orderId) {
            return printOrderTicketInternal(orderId, 'customer');
        }

        function printKitchenTicket(orderId) {
            return printOrderTicketInternal(orderId, 'kitchen');
        }

        function printOrderTicketInternal(orderId, mode) {
            try {
                const order = (Array.isArray(orders) ? orders : []).find(o => String(o.id) === String(orderId));
                if (!order) {
                    showNotification('No se encontró el pedido para imprimir', 'error');
                    return;
                }

                const PRINT_DELAY_MS = 700; // ticket ligero: menor espera
                const MAX_LINES_PER_JOB = 180; // imprimir en partes solo si es MUY largo

                // Ticket ligero: sin QR (reduce RAM/spool y evita cuelgues de impresora)

                const openWindowAndPrint = async () => {
                    const html = buildPrintableTicketHtml(order, undefined, mode);
                    const w = window.open('about:blank', '_blank', 'width=420,height=700');
                    if (!w) return false;
                    w.document.open();
                    w.document.write(html);
                    w.document.close();

                    const doPrint = () => {
                        try { w.focus(); } catch (_) {}
                        setTimeout(() => {
                            try { w.print(); } catch (_) {}
                        }, PRINT_DELAY_MS);
                    };

                    w.onload = () => {
                        try {
                            if (w.document && w.document.fonts && w.document.fonts.ready) {
                                // Esperar fuentes para evitar reflow durante impresión
                                w.document.fonts.ready.then(() => {}).catch(() => {});
                            }
                        } catch (_) {}
                        doPrint();
                    };

                    // Algunos navegadores imprimen mejor si no cierras de inmediato.
                    try {
                        w.onafterprint = () => {
                            // Dejar un pequeño margen antes de cerrar
                            setTimeout(() => { try { w.close(); } catch (_) {} }, 300);
                        };
                    } catch (_) {}

                    return true;
                };

                const openIframeAndPrint = async () => {
                    const html = buildPrintableTicketHtml(order, undefined, mode);

                    // Si el ticket es largo, imprimirlo en partes (reduce el tamaño del spool y evita que “se trabe” a la mitad)
                    const lines = order && Array.isArray(order.__sr_ticketLines) ? order.__sr_ticketLines : null;
                    const needsChunking = !!(lines && lines.length > MAX_LINES_PER_JOB);
                    const htmlParts = (() => {
                        if (!needsChunking) return [html];
                        const chunks = [];
                        for (let i = 0; i < lines.length; i += MAX_LINES_PER_JOB) {
                            chunks.push(lines.slice(i, i + MAX_LINES_PER_JOB));
                        }
                        return chunks.map((chunk) => {
                            const mmPerLine = 3.55;
                            const base = (mode === 'kitchen') ? 18 : 28;
                            const raw = base + (chunk.length * mmPerLine);
                            const rounded = Math.ceil(raw / 10) * 10;
                            const heightMm = Math.max(220, Math.min(500, rounded));
                            return buildPrintableTicketHtmlFromLines(chunk, heightMm, order, mode);
                        });
                    })();

                    const iframe = document.createElement('iframe');
                    iframe.style.position = 'fixed';
                    iframe.style.right = '0';
                    iframe.style.bottom = '0';
                    iframe.style.width = '0';
                    iframe.style.height = '0';
                    iframe.style.border = '0';
                    iframe.setAttribute('aria-hidden', 'true');
                    document.body.appendChild(iframe);
                    const cw = iframe.contentWindow;
                    const doc = cw && cw.document;
                    if (!doc || !cw) {
                        alert('No se pudo abrir impresión. Permite popups o usa otro navegador.');
                        return;
                    }

                    const removeIframe = () => {
                        try { document.body.removeChild(iframe); } catch (_) {}
                    };

                    const printPartsSequentially = async () => {
                        let idx = 0;

                        const printOne = () => {
                            const part = htmlParts[idx];
                            doc.open();
                            doc.write(part);
                            doc.close();

                            let finished = false;
                            const done = () => {
                                if (finished) return;
                                finished = true;
                                idx += 1;
                                if (idx >= htmlParts.length) {
                                    setTimeout(removeIframe, 400);
                                } else {
                                    setTimeout(printOne, 500);
                                }
                            };

                            try { cw.onafterprint = done; } catch (_) {}
                            setTimeout(done, 9000); // fallback

                            setTimeout(() => {
                                try { cw.focus(); cw.print(); } catch (_) { done(); }
                            }, PRINT_DELAY_MS);
                        };

                        printOne();
                    };

                    printPartsSequentially();

        // Marcar pedido como pagado
        async function markOrderPaid(orderId) {
            const orderIndex = orders.findIndex(o => o.id === orderId);
            const hadLocal = orderIndex !== -1;

            if (hadLocal && orders[orderIndex].paid) {
                showNotification('Este pedido ya estaba marcado como pagado', 'success');
                return;
            }

            // Optimistic UI update
            let prevPaid = null;
            let prevPaidAt = null;
            if (hadLocal) {
                prevPaid = !!orders[orderIndex].paid;
                prevPaidAt = orders[orderIndex].paidAt || null;
                orders[orderIndex].paid = true;
                orders[orderIndex].paidAt = new Date().toISOString();
                displayOrders();
                updateStats();
            }

            const payload = { paid: true, paidAt: new Date().toISOString() };

            const canCallApi = (location && (location.protocol === 'http:' || location.protocol === 'https:'));
            if (canCallApi) {
                try {
                    const storedKey = localStorage.getItem('sr_admin_key') || '';
                    const doRequest = async (key) => {
                        const r = await fetch('/api/mark-paid', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                ...(key ? { 'x-admin-key': key } : {})
                            },
                            body: JSON.stringify({ orderId })
                        });
                        const data = await r.json().catch(() => ({}));
                        return { status: r.status, ok: r.ok, data };
                    };

                    let apiRes = await doRequest(storedKey);
                    if (apiRes.status === 401) {
                        const entered = prompt('Clave admin requerida para marcar PAGADO (ADMIN_KEY):');
                        const key = (entered || '').trim();
                        if (key) {
                            localStorage.setItem('sr_admin_key', key);
                            apiRes = await doRequest(key);
                        }
                    }

                    if (!apiRes.ok || !apiRes.data || apiRes.data.ok !== true) {
                        throw new Error((apiRes.data && apiRes.data.error) || 'No se pudo marcar como pagado (API)');
                    }

                    showNotification(
                        apiRes.data.pointsCredited
                            ? `Pedido marcado como pagado (+${apiRes.data.pointsAdded || 0} pts)`
                            : 'Pedido marcado como pagado',
                        'success'
                    );
                    return;
                } catch (error) {
                    console.error('Error al marcar como pagado (API):', error);
                    // Continue below to fallback
                }
            }

            if (window.firebaseOrderManager) {
                try {
                    await window.firebaseOrderManager.updateOrder(orderId, payload);
                    showNotification('Pedido marcado como pagado', 'success');
                } catch (error) {
                    console.error('Error al marcar como pagado:', error);
                    // Revert optimistic change on error
                    if (hadLocal) {
                        orders[orderIndex].paid = prevPaid;
                        orders[orderIndex].paidAt = prevPaidAt;
                        displayOrders();
                        updateStats();
                    }
                    showNotification('Error al marcar el pedido como pagado', 'error');
                }
            } else {
                // Fallback localStorage
                if (!hadLocal) return;
                saveOrdersToLocalStorage();
                showNotification('Pedido marcado como pagado', 'success');
            }
        }

        // Eliminar pedido con confirmación
        function deleteOrder(orderId) {
            const order = orders.find(o => o.id === orderId);
            if (!order) return;

            const subtotal = Number(order.subtotal || 0);
            const subtotalAfterDiscount = Number(order.subtotalAfterDiscount || 0);
            const deliveryFee = Number(order.deliveryFee || order.deliveryCost || 0);
            const storedTotal = Number(order.total || 0);
            let discountAmount = Number(order.discountAmount || 0);
            if ((!isFinite(discountAmount) || discountAmount <= 0) && isFinite(subtotal) && subtotal > 0 && isFinite(subtotalAfterDiscount) && subtotalAfterDiscount > 0 && subtotalAfterDiscount < subtotal) {
                discountAmount = Number((subtotal - subtotalAfterDiscount).toFixed(2));
            }
            if ((!isFinite(discountAmount) || discountAmount <= 0) && isFinite(subtotal) && subtotal > 0 && isFinite(storedTotal) && storedTotal > 0) {
                const inferred = (subtotal + deliveryFee) - storedTotal;
                if (isFinite(inferred) && inferred > 0.01) discountAmount = Number(inferred.toFixed(2));
            }
            if (!isFinite(discountAmount) || discountAmount < 0) discountAmount = 0;
            discountAmount = Math.min(discountAmount, isFinite(subtotal) ? subtotal : discountAmount);
            const effectiveTotal = (isFinite(subtotal) && subtotal > 0)
                ? Number((subtotal - discountAmount + deliveryFee).toFixed(2))
                : (isFinite(storedTotal) ? storedTotal : 0);
            
            // Crear modal de confirmación
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
            modal.innerHTML = `
                <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
                    <div class="text-center">
                        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-exclamation-triangle text-red-600 text-2xl"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-900 mb-2">¿Eliminar Pedido?</h3>
                        <p class="text-gray-300 mb-2">¿Estás seguro de que quieres eliminar el pedido #${order.id.slice(-6)}?</p>
                        <p class="text-sm text-gray-500 mb-6">Cliente: ${order.customer.name} - Total: $${effectiveTotal.toFixed(2)}</p>
                        <div class="flex space-x-3">
                            <button onclick="cancelDelete()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-2 px-4 rounded-lg transition duration-300">
                                Cancelar
                            </button>
                            <button onclick="confirmDelete('${orderId}')" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300">
                                <i class="fas fa-trash mr-2"></i>
                                Eliminar
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        }

        // Actualizar estado de orden
        function updateOrderStatus(orderId, newStatus) {
            const orderIndex = orders.findIndex(o => o.id === orderId);
            const hadLocal = orderIndex !== -1;

            // Caso especial: al marcar ENTREGADO, solo actualizar status (el Control lo oculta)
            if (String(newStatus).toLowerCase() === 'delivered') {
                // Optimistic UI: marcar delivered localmente para que desaparezca por el filtro
                let prevStatus = null;
                if (hadLocal) {
                    prevStatus = orders[orderIndex].status;
                    orders[orderIndex].status = 'delivered';
                    orders[orderIndex].deliveredAt = new Date().toISOString();
                    displayOrders();
                    updateStats();
                }

                const payload = { status: 'delivered', deliveredAt: new Date().toISOString() };

                if (window.firebaseOrderManager) {
                    window.firebaseOrderManager.updateOrder(orderId, payload)
                        .then(() => {
                            showNotification('Pedido marcado como entregado', 'success');
                        })
                        .catch((error) => {
                            console.error('Error al marcar entregado:', error);
                            // Revert optimistic change on error
                            if (hadLocal && prevStatus != null) {
                                orders[orderIndex].status = prevStatus;
                                displayOrders();
                                updateStats();
                            }
                            showNotification('Error al marcar el pedido como entregado', 'error');
                        });
                } else {
                    if (!hadLocal) return;
                    saveOrdersToLocalStorage();
                    showNotification('Pedido marcado como entregado', 'success');
                }
                return;
            }

            // Optimistic UI update
            let prevStatus = null;
            if (hadLocal) {
                prevStatus = orders[orderIndex].status;
                orders[orderIndex].status = newStatus;
                displayOrders();
                updateStats();
            }

            if (window.firebaseOrderManager) {
                window.firebaseOrderManager.updateOrder(orderId, { status: newStatus })
                    .then(() => {
                        const statusText = getStatusInfo(newStatus).text;
                        showNotification(`Pedido actualizado a: ${statusText}`, 'success');
                    })
                    .catch((error) => {
                        console.error('Error al actualizar estado:', error);
                        // Revert optimistic change on error
                        if (hadLocal && prevStatus) {
                            orders[orderIndex].status = prevStatus;
                            displayOrders();
                            updateStats();
                        }
                        showNotification('Error al actualizar el pedido', 'error');
                    });
            } else {
                // Fallback localStorage
                if (!hadLocal) return;
                saveOrdersToLocalStorage();
                const statusText = getStatusInfo(newStatus).text;
                showNotification(`Pedido actualizado a: ${statusText}`, 'success');
            }
        }

        // Calcular tiempo estimado
        function calculateEstimatedTime(items) {
            // Tiempo base + tiempo por item
            const baseTime = 15;
            const timePerItem = 5;
            return baseTime + (items.length * timePerItem);
        }

        // Obtener tiempo transcurrido
        function getTimeAgo(timestamp) {
            const now = new Date();
            const orderTime = new Date(timestamp);
            const diffMs = now - orderTime;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'Ahora mismo';
            if (diffMins < 60) return `Hace ${diffMins} min`;
            
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours < 24) return `Hace ${diffHours}h`;
            
            const diffDays = Math.floor(diffHours / 24);
            return `Hace ${diffDays}d`;
        }

        // Reproducir sonido de notificación
        function playNotificationSound() {
            // Crear un beep corto (reutiliza AudioContext si existe)
            ensureAudioUnlocked();
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;
            if (!_notifAudioCtx) _notifAudioCtx = new Ctx();
            const audioContext = _notifAudioCtx;
            if (audioContext.state === 'suspended') {
                audioContext.resume().catch(() => {});
            }

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }

    // Limpieza al salir de la página: desuscribir listener de Firebase si existe
        window.addEventListener('beforeunload', () => {
            try {
                if (typeof unsubscribeOrders === 'function') {
                    unsubscribeOrders();
                }
            } catch (e) {
                // noop
            }
        });

    // Exponer handlers al scope global para soporte de atributos onclick
    window.refreshOrders = refreshOrders;
    window.filterOrders = filterOrders;
    window.confirmOrder = confirmOrder;
    window.updateOrderStatus = updateOrderStatus;
    window.deleteOrder = deleteOrder;
    window.cancelDelete = cancelDelete;
    window.confirmDelete = confirmDelete;
    window.sendOnWayMessage = sendOnWayMessage;
    window.sendArrivedMessage = sendArrivedMessage;
    window.toggleItemChecked = toggleItemChecked;

        // Función para ser llamada desde paginaburger.html
        window.addOrderToControl = addOrder;
    </script>

    <!-- ── WhatsApp status indicator ──────────────────────────────────── -->
    <script>
    (function() {
        const dot   = document.getElementById('wa-status-dot');
        const label = document.getElementById('wa-status-label');
        if (!dot) return;

        async function checkWA() {
            try {
                const r = await fetch('/api/whatsapp/status');
                if (!r.ok) throw new Error();
                const j = await r.json();
                if (j.connected) {
                    dot.style.background = '#22c55e';
                    dot.title = 'WhatsApp conectado';
                    if (label) label.textContent = 'WA ✓';
                } else if (j.hasQr) {
                    dot.style.background = '#f59e0b';
                    dot.title = 'Esperando escaneo QR';
                    if (label) label.textContent = 'WA QR';
                } else {
                    dot.style.background = '#ef4444';
                    dot.title = 'WhatsApp desconectado';
                    if (label) label.textContent = 'WA';
                }
            } catch (_) {
                dot.style.background = '#6b7280';
            }
        }

        checkWA();
        setInterval(checkWA, 10000);
    })();
    </script>
