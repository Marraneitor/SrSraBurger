  <script type="module">
    // ===== FIREBASE IMPORTS =====
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
    import { 
      getFirestore, 
      doc, 
      getDoc, 
      setDoc, 
      onSnapshot,
      collection,
      addDoc,
      query,
      orderBy,
      limit,
      serverTimestamp,
      runTransaction
    } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';

    // ===== FIREBASE CONFIG =====
    const firebaseConfig = {
      apiKey: "AIzaSyCf7-6oLHjpNgU1zr4qdTrOKuXGe1ht2Zs",
      authDomain: "sr-sra-burger.firebaseapp.com",
      projectId: "sr-sra-burger",
      storageBucket: "sr-sra-burger.firebasestorage.app",
      messagingSenderId: "542059080203",
      appId: "1:542059080203:web:2e15f179a1475b1a77f50e"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ===== SISTEMA DE RECETAS =====
    const RECETAS = {
      hamburguesa_sencilla: {
        nombre: 'Hamburguesa Sencilla',
        ingredientes: {
          pan: 1,
          carne: 1,
          lechuga: 20,
          jitomate: 15,
          queso: 1,
          cebolla: 10
        }
      },
      hamburguesa_doble: {
        nombre: 'Hamburguesa Doble',
        ingredientes: {
          pan: 1,
          carne: 2,
          lechuga: 25,
          jitomate: 20,
          queso: 2,
          cebolla: 15,
          tocino: 2
        }
      },
      boneless: {
        nombre: 'Boneless (10 pzas)',
        ingredientes: {
          pollo: 250,
          harina: 50,
          aceite: 100
        }
      },
      papas: {
        nombre: 'Papas Fritas',
        ingredientes: {
          papa: 200,
          aceite: 50,
          sal: 5
        }
      }
    };

    // ===== CONFIGURACIÓN DE STOCK MÍNIMO POR DEFECTO =====
    const STOCK_MINIMO_DEFAULT = {
      'g': 200,
      'kg': 0.5,
      'ml': 200,
      'L': 0.5,
      'unidad': 5,
      'pz': 5,
      'u': 5,
      'grs': 200,
      'default': 10
    };

    // Función para calcular stock mínimo basado en unidad
    function calcularStockMinimo(unidad, cantidad) {
      const unidadLower = String(unidad || '').toLowerCase();
      
      if (unidadLower.includes('kg')) return Math.max(1, Math.floor(cantidad * 0.2));
      if (unidadLower.includes('g') || unidadLower === 'grs') return Math.max(100, Math.floor(cantidad * 0.15));
      if (unidadLower.includes('l')) return Math.max(1, Math.floor(cantidad * 0.2));
      if (unidadLower.includes('ml')) return Math.max(100, Math.floor(cantidad * 0.15));
      if (unidadLower.includes('unidad') || unidadLower === 'pz' || unidadLower === 'u') {
        return Math.max(5, Math.floor(cantidad * 0.2));
      }
      
      return Math.max(10, Math.floor(cantidad * 0.2));
    }

    // ===== FUNCIONES DE FIREBASE =====
    let inventarioCache = null;
    let unsubscribeInventario = null;
    let ingredientesCatalogo = [];

    // Cargar catálogo de ingredientes desde Firebase (ingredientes.html)
    async function cargarIngredientesCatalogo() {
      try {
        // Intentar cargar desde Firebase Settings
        if (window.firebaseManager && window.firebaseManager.getSettings) {
          const settings = await window.firebaseManager.getSettings();
          const catalog = settings?.ingredientsCatalog;
          
          if (Array.isArray(catalog) && catalog.length > 0) {
            ingredientesCatalogo = catalog;
            console.log(`✅ ${catalog.length} ingredientes cargados desde Firebase Settings`);
            return;
          }
        }
        
        // Fallback: intentar desde localStorage (ingredientes.html)
        const localIngredientes = localStorage.getItem('sr_ingredients_v1');
        if (localIngredientes) {
          try {
            const parsed = JSON.parse(localIngredientes);
            if (Array.isArray(parsed)) {
              ingredientesCatalogo = parsed;
              console.log(`✅ ${parsed.length} ingredientes cargados desde localStorage`);
              return;
            }
          } catch (e) {
            console.error('Error al parsear ingredientes locales:', e);
          }
        }
        
        console.warn('⚠️ No se encontraron ingredientes en Firebase ni localStorage');
      } catch (error) {
        console.error('Error al cargar ingredientes:', error);
      }
    }

    // Crear estructura de inventario desde ingredientes
    function crearInventarioDesdeIngredientes() {
      const inventario = {};
      
      ingredientesCatalogo.forEach(ing => {
        const nombre = ing.nombre || ing.name;
        const unidad = ing.unidad || ing.unit || 'unidad';
        
        if (!nombre) return;
        
        // Usar nombre normalizado como key (sin espacios, minúsculas)
        const key = nombre.toLowerCase().replace(/\s+/g, '_');
        
        // Calcular cantidad inicial basada en unidades por paquete
        const unidadesPaquete = ing.unidadesPaquete || ing.unitsPerPack || 10;
        const cantidadInicial = Math.floor(unidadesPaquete * 2); // 2 paquetes iniciales
        
        inventario[key] = {
          nombre: nombre,
          cantidad: cantidadInicial,
          unidad: unidad,
          minimo: calcularStockMinimo(unidad, cantidadInicial),
          ingredienteId: ing.id
        };
      });
      
      return inventario;
    }

    // Inicializar inventario en Firebase si no existe
    async function initInventarioFirebase() {
      const docRef = doc(db, 'inventario', 'stock');
      const docSnap = await getDoc(docRef);
      
      if (!docSnap.exists()) {
        // Cargar ingredientes del catálogo
        await cargarIngredientesCatalogo();
        
        let inventarioInicial;
        
        if (ingredientesCatalogo.length > 0) {
          // Crear inventario desde ingredientes reales
          inventarioInicial = crearInventarioDesdeIngredientes();
          console.log(`✅ Inventario creado con ${Object.keys(inventarioInicial).length} ingredientes del catálogo`);
        } else {
          // Si no hay ingredientes, crear estructura vacía
          inventarioInicial = {};
          console.warn('⚠️ Inventario vacío creado (no hay ingredientes en el catálogo)');
        }
        
        await setDoc(docRef, {
          items: inventarioInicial,
          lastUpdated: serverTimestamp(),
          createdFrom: 'ingredientes_catalog',
          createdAt: serverTimestamp()
        });
        
        showAlert('✅ Inventario inicializado con ingredientes del catálogo', 'success');
      } else {
        // Inventario ya existe, cargar ingredientes del catálogo para referencia
        await cargarIngredientesCatalogo();
        console.log('✅ Inventario existente cargado');
      }
    }

    // Obtener inventario desde Firebase (sincronización en tiempo real)
    function subscribeToInventario() {
      const docRef = doc(db, 'inventario', 'stock');
      
      unsubscribeInventario = onSnapshot(docRef, (doc) => {
        if (doc.exists()) {
          inventarioCache = doc.data().items;
          renderInventario();
          updateStats();
          console.log('🔄 Inventario sincronizado desde Firebase');
        }
      }, (error) => {
        console.error('Error al escuchar inventario:', error);
        showAlert('Error de conexión con Firebase', 'danger');
      });
    }

    function getInventario() {
      return inventarioCache || INVENTARIO_INICIAL;
    }

    async function saveInventario(inventario) {
      try {
        const docRef = doc(db, 'inventario', 'stock');
        await setDoc(docRef, {
          items: inventario,
          lastUpdated: serverTimestamp()

    // ===== FUNCIÓN PRINCIPAL: REGISTRAR VENTA =====
    function registrarVenta(producto) {
      const receta = RECETAS[producto];
      if (!receta) {
        showAlert('Producto no encontrado en recetas', 'danger');
        return false;
      }

      const inventario = getInventario();
      const faltantes = [];

      // Verificar stock suficiente
      for (const [ingrediente, cantidad] of Object.entries(receta.ingredientes)) {
        if (!inventario[ingrediente]) {
          faltantes.push(`${ingrediente} (no existe en inventario)`);
        } else if (inventario[ingrediente].cantidad < cantidad) {
          faltantes.push(`${ingrediente} (necesitas ${cantidad}, tienes ${inventario[ingrediente].cantidad})`);
        }
      }

      // Si hay faltantes, mostrar alerta
      if (faltantes.length > 0) {
        showAlert(`Stock insuficiente: ${faltantes.join(', ')}`, 'danger');
        return false;
      }

      // Descontar ingredientes
      for (const [ingrediente, cantidad] of Object.entries(receta.ingredientes)) {
        inventario[ingrediente].cantidad -= cantidad;
      }

      saveInventario(inventario);
      showAlert(`Venta registrada: ${receta.nombre} ✓`, 'success');
      addActivityLog(`Venta: ${receta.nombre}`, 'sale');
      
      // Increment sales counter
      const today = new Date().toDateString();
      const sales = JSON.parse(localStorage.getItem('sales_today_srburger') || '{}');
      sales[today] = (sales[today] || 0) + 1;
      localStorage.setItem('sales_today_srburger', JSON.stringify(sales));
      updateStats();

      return true;
    }

    async function sincronizarConCatalogo() {
      if (!confirm('¿Deseas sincronizar el inventario con el catálogo de ingredientes? Esto agregará nuevos ingredientes pero NO eliminará los existentes.')) {
        return;
      }
      
      try {
        showAlert('Sincronizando con catálogo...', 'success');
        
        // Recargar catálogo de ingredientes
        await cargarIngredientesCatalogo();
        
        if (ingredientesCatalogo.length === 0) {
          showAlert('No hay ingredientes en el catálogo para sincronizar', 'danger');
          return;
        }
        
        // Obtener inventario actual
        const inventarioActual = getInventario();
        const keysActuales = new Set(Object.keys(inventarioActual));
        
        // Crear nuevos ingredientes desde el catálogo
        const nuevoInventario = crearInventarioDesdeIngredientes();
        let agregados = 0;
        
        // Merge: agregar solo los que no existen
        for (const [key, data] of Object.entries(nuevoInventario)) {
          if (!keysActuales.has(key)) {
            inventarioActual[key] = data;
            agregados++;
          }
        }
        
        if (agregados > 0) {
          await saveInventario(inventarioActual);
          showAlert(`✅ Se agregaron ${agregados} nuevos ingredientes al inventario`, 'success');
          await addActivityLog(`Sincronización: ${agregados} ingredientes nuevos agregados`, 'add');
        } else {
          showAlert('✓ El inventario ya está sincronizado con el catálogo', 'success');
        }
        
      } catch (error) {
        console.error('Error al sincronizar:', error);
        showAlert('Error al sincronizar con el catálogo', 'danger');
      }
    }
